<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#7f9c96">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-512-maskable.png" type="image/png">
<link rel="apple-touch-icon" href="./icon-512-maskable.png">
<title>DSE Level 1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Zen+Maru+Gothic:wght@500;700&display=swap');
:root{
  --base-bg:#fdfbf7;
  --primary:#4ecdc4;
  --primary-dark:#2cb5ac;
  --secondary:#ffe66d;
  --secondary-dark:#ffb703;
  --text:#444444;
  --muted:#666;
  --line:#d1d8e0;
  --panel:#ffffff;
  --ok:#e8f5e9;
  --bad:#ffebee;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  -webkit-tap-highlight-color:transparent;
  font-family:"M PLUS Rounded 1c","Zen Maru Gothic","Hiragino Kaku Gothic ProN",sans-serif;
  background:var(--base-bg);
  color:var(--text);
  padding:14px;
}
.app{width:min(560px,100%);margin:0 auto}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}
.back{
  display:inline-flex;
  justify-content:center;
  align-items:center;
  width:44px;
  height:44px;
  border-radius:16px;
  border:2px dashed var(--line);
  background:#fff;
  color:var(--primary-dark);
  text-decoration:none;
  font-size:22px;
  font-weight:900;
  box-shadow:0 4px 0 #f0f0f0;
}
.scorebar{
  display:flex;
  gap:8px;
}
.pill{
  padding:8px 12px;
  border-radius:999px;
  border:2px dashed var(--line);
  background:#fff;
  font-size:12px;
  font-weight:900;
  box-shadow:0 4px 0 #f0f0f0;
}
.screen{
  background:var(--panel);
  border:3px dashed var(--primary);
  border-radius:28px;
  padding:18px;
  box-shadow:0 0 0 6px #fff,0 10px 20px rgba(78,205,196,.15);
}
.question{
  margin-top:2px;
  padding:16px;
  border-radius:24px;
  background:#fff;
  border:4px dashed var(--primary);
  box-shadow:0 6px 0 rgba(78,205,196,.18);
}
.zh{
  margin:0;
  font-size:30px;
  line-height:1.12;
  font-weight:900;
  color:var(--primary-dark);
  text-align:center;
}
.pattern{
  display:none;
  margin:8px 0 0;
  color:#666;
  font-size:13px;
  line-height:1.5;
  text-align:center;
}
.choices{
  display:grid;
  gap:10px;
  margin-top:14px;
  transition:all .25s ease;
}
.choice{
  width:100%;
  padding:15px 16px;
  text-align:center;
  border:3px dashed var(--line);
  border-radius:50px;
  background:#fff;
  font-size:17px;
  font-weight:900;
  color:var(--text);
  cursor:pointer;
  box-shadow:0 4px 0 #e9ecef;
}
.choice.correct{
  background:var(--ok);
  border-color:#6bf178;
  color:#2d6a4f;
  box-shadow:none;
}
.choice.wrong{
  background:var(--bad);
  border-color:#ff6b6b;
  color:#c92a2a;
  box-shadow:none;
}
.choice.dim{opacity:.56}
.choice:hover{
  background:#e0fbfc;
  border-color:var(--primary);
  color:var(--primary-dark);
  transform:translateY(-2px);
}
.choices.compact{
  gap:8px;
}
.choice.keep{
  animation:keepChoice .28s ease;
}
@keyframes keepChoice{
  from{opacity:.35;transform:translateY(8px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.teach{
  display:none;
  margin-top:14px;
  padding:14px;
  border-radius:22px;
  background:#f8f9fa;
  border:2px dashed var(--line);
  box-shadow:0 4px 0 rgba(0,0,0,.05);
  animation:teachRise .3s ease;
}
@keyframes teachRise{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.line{
  margin:0 0 10px;
  font-size:14px;
  line-height:1.6;
}
.answer{
  margin:0 0 10px;
  font-size:15px;
  color:var(--primary-dark);
}
.examples-wrap{
  border:2px dashed var(--line);
  border-radius:18px;
  background:#fff;
  overflow:hidden;
}
.example-preview,
.examples-more{
  padding:12px 14px;
}
.examples strong{
  display:block;
  margin:0 0 6px;
  color:var(--primary-dark);
}
.examples p{
  margin:6px 0;
  font-size:13px;
  line-height:1.6;
}
.example-toggle{
  width:100%;
  border:none;
  border-top:2px dashed #edf1f2;
  background:#fff;
  color:var(--primary-dark);
  padding:10px 14px 12px;
  font:inherit;
  font-size:13px;
  font-weight:900;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
}
.example-toggle[hidden]{
  display:none;
}
.toggle-arrow{
  font-size:22px;
  line-height:1;
  animation:bounceDown 1.2s ease-in-out infinite;
}
.example-toggle.open .toggle-arrow{
  transform:rotate(180deg);
  animation:none;
}
@keyframes bounceDown{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(4px)}
}
.examples-more{
  display:none;
  border-top:2px dashed #edf1f2;
}
.examples-more.open{
  display:block;
  animation:teachRise .25s ease;
}
.zh-line{color:#666}
.actions{
  display:grid;
  gap:10px;
  margin-top:14px;
}
.btn{
  width:100%;
  padding:14px 16px;
  border:none;
  border-radius:50px;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
}
.btn-next{
  background:var(--secondary);
  color:#5d4037;
  box-shadow:0 4px 0 var(--secondary-dark),0 8px 10px rgba(255,193,7,.3);
}
.btn-next:disabled{opacity:.45}
.btn-home{
  background:#fff;
  color:#888;
  border:2px solid #eee;
  box-shadow:0 4px 0 #e0e0e0;
}
.end{
  display:none;
}
.score{
  margin-top:14px;
  padding:16px;
  border-radius:24px;
  background:var(--secondary);
  color:#5d4037;
  border:4px solid #fff;
  box-shadow:0 6px 15px rgba(255,193,7,.3);
  font-size:30px;
  font-weight:900;
  text-align:center;
}
.review{
  display:grid;
  gap:10px;
  margin-top:14px;
}
.item{
  padding:14px;
  border-radius:20px;
  background:#fff;
  border:2px dashed #ffc9c9;
  font-size:13px;
  line-height:1.6;
}
strong{font-weight:900}
</style>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("./service-worker.js").catch(()=>{})});
}
</script>
</head>
<body>
<main class="app">
  <section id="game">
    <div class="topbar">
      <a class="back" href="./index.html">‹</a>
      <div class="scorebar">
        <div class="pill"><span id="currentNo">1</span>/<span id="totalNo">20</span></div>
        <div class="pill">Score <span id="scoreNo">0</span></div>
      </div>
    </div>

    <div class="screen">
      <section class="question">
        <p id="promptZh" class="zh">載入中...</p>
        <p id="promptPattern" class="pattern"></p>
      </section>

      <section id="choices" class="choices"></section>

      <section id="teach" class="teach">
        <p id="exp" class="line"></p>
        <p id="answer" class="answer"></p>
        <section class="examples-wrap">
          <div id="examplePreview" class="example-preview examples"></div>
          <button id="exampleToggle" class="example-toggle" type="button" hidden>
            <span class="toggle-arrow">⌄</span>
          </button>
          <div id="examplesMore" class="examples-more examples"></div>
        </section>
      </section>

      <div class="actions">
        <button class="btn btn-next" id="nextBtn" type="button" disabled>下一題</button>
        <button class="btn btn-home" type="button" onclick="location.href='./index.html'">Main Menu</button>
      </div>
    </div>
  </section>

  <section id="end" class="end">
    <div class="screen">
      <h1 style="margin:0 0 8px;text-align:center;color:var(--primary-dark);font-size:30px;"><strong>完成</strong></h1>
      <div id="finalScore" class="score"></div>
      <div id="review" class="review"></div>
      <div class="actions">
        <button class="btn btn-next" type="button" onclick="startGame()">再玩一次</button>
        <button class="btn btn-home" type="button" onclick="location.href='./index.html'">Main Menu</button>
      </div>
    </div>
  </section>
</main>

<script>
const fallback={
  exp:"此連接詞已加入題庫，之後可再補更完整教學內容。",
  l4en:"Example will be added.",
  l4zh:"例句稍後補上。",
  l5en:"Advanced example will be added.",
  l5zh:"進階例句稍後補上。"
};
const TOTAL_QUESTIONS=20;
let bank=[];
let questions=[];
let index=0;
let score=0;
let answered=false;
let reviewLog=[];
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function unlockAudio(){if(audioCtx.state==="suspended")audioCtx.resume().catch(()=>{})}
function blip(freq,type,duration,volume=.12){
  unlockAudio();
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type=type;
  osc.frequency.value=freq;
  gain.gain.setValueAtTime(volume,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+duration);
  osc.start();
  osc.stop(audioCtx.currentTime+duration);
}
const sfx={
  tap:()=>blip(420,"triangle",.06,.08),
  next:()=>{blip(520,"triangle",.07,.11);setTimeout(()=>blip(620,"triangle",.1,.09),60)},
  ok:()=>{blip(660,"triangle",.1,.14);setTimeout(()=>blip(880,"triangle",.14,.12),80)},
  bad:()=>{blip(240,"sawtooth",.15,.15);setTimeout(()=>blip(170,"sawtooth",.2,.11),90)}
};
const answerGroupsMap={
  1:[["since"],["as"],["because"],["mainly because"],["partly because"],["simply because"]],
  2:[["due to"],["thanks to"],["because of"]],
  3:[["and therefore"],["thus"],["hence"],["as a result"],["therefore"]],
  6:[["while"],["despite the fact that"]],
  11:[["on top of that"],["moreover"],["besides"],["what's more","whats more"],["plus"],["furthermore"],["in addition"]],
  12:[["and yet"],["nevertheless"],["nonetheless"],["however"]],
  13:[["be that as it may"],["that said"],["having said that"],["with that said"]],
  18:[["to put it simply"],["simply put"]],
  19:[["it goes without saying that"],["needless to say"]],
  22:[["also"],["as well"]],
  26:[["as mentioned"],["as mentioned above"]],
  29:[["from this line of thinking"],["in this sense"],["with this in mind"]],
  30:[["to begin with"],["first of all"]],
  33:[["as everyone knows"],["it is widely acknowledged that"]],
  35:[["given"],["in view of"],["in light of"]],
  38:[["apart from"],["aside from"],["other than"],["beyond"]],
  39:[["in general"],["generally speaking"]],
  41:[["it is suggested that"],["it is advisable that"]],
  43:[["such as"],["for example"],["ranging from"],["from"]],
  55:[["to"],["in order to"],["so as to"]],
  56:[["it turns out that"],["it turned out that"]],
  57:[["instead of"],["rather than"]],
  59:[["on the one hand"],["on the other hand"]],
  60:[["for one thing"],["for another"]]
};
const $=id=>document.getElementById(id);

function splitEn(text){
  return (text||"").match(/[^.!?]+[.!?]+|[^.!?]+$/g)||[];
}
function splitZh(text){
  return (text||"").match(/[^。！？]+[。！？]+|[^。！？]+$/g)||[];
}
function renderExamples(title,enText,zhText){
  const en=splitEn(enText).map(s=>s.trim()).filter(Boolean);
  const zh=splitZh(zhText).map(s=>s.trim()).filter(Boolean);
  const count=Math.max(en.length,zh.length);
  return `<strong>${title}</strong>${Array.from({length:count},(_,idx)=>`<p>${en[idx]||""}</p><p class="zh-line">${zh[idx]||""}</p>`).join("")}`;
}
function getExamplesList(title,enText,zhText){
  const en=splitEn(enText).map(s=>s.trim()).filter(Boolean);
  const zh=splitZh(zhText).map(s=>s.trim()).filter(Boolean);
  const count=Math.max(en.length,zh.length);
  return Array.from({length:count},(_,idx)=>({
    title,
    en:en[idx]||"",
    zh:zh[idx]||""
  })).filter(item=>item.en||item.zh);
}
function shuffle(arr){
  const copy=[...arr];
  for(let i=copy.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [copy[i],copy[j]]=[copy[j],copy[i]];
  }
  return copy;
}
function getAnswerGroups(item){
  return answerGroupsMap[item.id]||item.answers.map(answer=>[answer]);
}
function getCorrectOption(item){
  if(item.display) return item.display;
  const groups=getAnswerGroups(item);
  return groups.map(group=>group[0]).join(" / ");
}
function uniqueOptions(correct,currentId){
  const pool=shuffle(bank.filter(item=>item.id!==currentId).map(getCorrectOption))
    .filter((value,idx,array)=>value!==correct && array.indexOf(value)===idx);
  return shuffle([correct,...pool.slice(0,3)]);
}
async function loadBank(){
  const response=await fetch("./eng_game_connectives.html",{cache:"no-store"});
  const html=await response.text();
  const match=html.match(/(const bank=\[[\s\S]*?\];)\s*const fallback=/);
  if(!match) throw new Error("bank not found");
  return new Function(match[1] + "return bank;")();
}
function showQuestion(){
  if(index>=questions.length){
    showEnd();
    return;
  }
  answered=false;
  $("nextBtn").disabled=true;
  $("teach").style.display="none";
  $("choices").classList.remove("compact");
  const item=questions[index];
  $("currentNo").textContent=index+1;
  $("totalNo").textContent=questions.length;
  $("scoreNo").textContent=score;
  $("promptZh").textContent=item.zh;
  $("promptPattern").textContent="";
  const correct=getCorrectOption(item);
  const options=uniqueOptions(correct,item.id);
  $("choices").innerHTML=options.map(option=>`<button class="choice" type="button">${option}</button>`).join("");
  [...$("choices").querySelectorAll(".choice")].forEach(button=>{
    button.addEventListener("click",()=>checkAnswer(button,item,correct));
  });
}
function checkAnswer(button,item,correct){
  if(answered) return;
  answered=true;
  const chosen=button.textContent.trim();
  const correctButtons=[...$("choices").querySelectorAll(".choice")].filter(btn=>btn.textContent.trim()===correct);
  const isCorrect=chosen===correct;
  const keptOptions=isCorrect?[correct]:[chosen,correct].filter((value,idx,array)=>array.indexOf(value)===idx);
  if(isCorrect){
    score++;
    sfx.ok();
  }else{
    reviewLog.push({zh:item.zh,chosen,correct});
    sfx.bad();
  }
  $("choices").classList.add("compact");
  $("choices").innerHTML=keptOptions.map(option=>{
    const cls=isCorrect
      ? "choice correct keep"
      : option===correct
        ? "choice correct keep"
        : "choice wrong keep";
    return `<button class="${cls}" type="button" disabled>${option}</button>`;
  }).join("");
  renderTeach(item,correct,isCorrect,chosen);
  $("scoreNo").textContent=score;
  $("nextBtn").disabled=false;
}
function renderTeach(item,correct,isCorrect,chosen){
  const data={...fallback,...item};
  $("exp").textContent=data.exp||data.note||"";
  $("answer").textContent=isCorrect?`正確：${correct}`:`你的答案：${chosen}  正確：${correct}`;
  const allExamples=[
    ...getExamplesList("Level 4",data.l4en,data.l4zh),
    ...getExamplesList("Level 5",data.l5en,data.l5zh)
  ];
  const first=allExamples[0];
  const rest=allExamples.slice(1);
  $("examplePreview").innerHTML=first
    ? `<strong>${first.title}</strong><p>${first.en}</p><p class="zh-line">${first.zh}</p>`
    : "";
  $("examplesMore").innerHTML=rest.map(example=>`<strong>${example.title}</strong><p>${example.en}</p><p class="zh-line">${example.zh}</p>`).join("");
  $("examplesMore").classList.remove("open");
  $("exampleToggle").classList.remove("open");
  $("exampleToggle").hidden=rest.length===0;
  $("teach").style.display="block";
}
function showEnd(){
  $("game").style.display="none";
  $("end").style.display="block";
  const total=questions.length;
  const percentage=total?Math.round(score/total*100):0;
  $("finalScore").textContent=`${score} / ${total} (${percentage}%)`;
  $("review").innerHTML=reviewLog.length
    ? reviewLog.map(item=>`<div class="item"><strong>${item.zh}</strong><div>你的答案：${item.chosen}</div><div>正確：${item.correct}</div></div>`).join("")
    : `<div class="item">今次全對。</div>`;
}
function startGame(){
  $("game").style.display="block";
  $("end").style.display="none";
  questions=shuffle(bank).slice(0,Math.min(TOTAL_QUESTIONS,bank.length));
  index=0;
  score=0;
  reviewLog=[];
  showQuestion();
}
$("nextBtn").addEventListener("click",()=>{
  sfx.next();
  index++;
  showQuestion();
});
$("exampleToggle").addEventListener("click",()=>{
  const isOpen=$("examplesMore").classList.toggle("open");
  $("exampleToggle").classList.toggle("open",isOpen);
  sfx.tap();
});
document.addEventListener("pointerdown",unlockAudio,{once:true});
document.addEventListener("click",event=>{
  const target=event.target;
  if(target.closest(".choice")||target.closest(".btn")||target.closest(".back")){
    sfx.tap();
  }
});
loadBank()
  .then(items=>{
    bank=items;
    startGame();
  })
  .catch(()=>{
    $("promptZh").textContent="載入失敗";
    $("promptPattern").textContent="請 refresh 再試";
    $("choices").innerHTML="";
  });
</script>
</body>
</html>
