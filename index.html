<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#4ecdc4">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-512-maskable.png" type="image/png">
<link rel="apple-touch-icon" href="./icon-512-maskable.png">
<title>DSE Connective App</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Zen+Maru+Gothic:wght@500;700&display=swap');
:root{
  --base-bg:#fdfbf7;
  --primary:#4ecdc4;
  --primary-dark:#2cb5ac;
  --secondary:#ffe66d;
  --secondary-dark:#ffb703;
  --text:#444444;
  --line:#d1d8e0;
  --panel:#ffffff;
  --soft:#e0fbfc;
  --soft-2:#f8f9fa;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%}
body{
  font-family:"M PLUS Rounded 1c","Zen Maru Gothic","Hiragino Kaku Gothic ProN",sans-serif;
  background:var(--base-bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:18px;
}
.app{
  width:min(560px,100%);
}
.title{
  text-align:center;
  margin:0 0 22px;
  font-size:42px;
  line-height:1.02;
  font-weight:900;
  color:var(--primary-dark);
}
.menu{
  display:grid;
  gap:16px;
}
.row{
  display:grid;
  gap:16px;
}
.row.two{
  grid-template-columns:1fr 1fr;
}
.pill{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:92px;
  padding:18px 20px;
  border-radius:999px;
  text-decoration:none;
  font-size:28px;
  font-weight:900;
  text-align:center;
  transition:transform .12s ease,box-shadow .12s ease,background-color .12s ease;
}
.pill:active{
  transform:translateY(3px);
}
.pill-main{
  background:#fff;
  border:3px dashed var(--primary);
  color:var(--primary-dark);
  box-shadow:0 6px 0 #bde0e1;
}
.pill-main:hover{
  background:var(--soft);
}
.pill-level{
  background:var(--secondary);
  border:none;
  color:#5d4037;
  box-shadow:0 6px 0 var(--secondary-dark),0 10px 14px rgba(255,193,7,.26);
}
.pill-off{
  background:#fff;
  border:3px dashed var(--line);
  color:#9aa4aa;
  box-shadow:0 6px 0 #eceff1;
}
@media(max-width:640px){
  .title{font-size:36px;margin-bottom:18px}
  .pill{min-height:84px;font-size:24px}
  .menu,.row{gap:14px}
}
</style>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("./service-worker.js").catch(()=>{})});
}
</script>
</head>
<body>
<main class="app">
  <h1 class="title">DSE<br>Connective</h1>

  <section class="menu">
    <div class="row">
      <a class="pill pill-main" href="./revision.html">溫習表</a>
    </div>

    <div class="row two">
      <a class="pill pill-level" href="./level1.html">LEVEL 1</a>
      <a class="pill pill-level" href="./eng_game_connectives.html">LEVEL 2</a>
    </div>

    <div class="row two">
      <span class="pill pill-off">LEVEL 3</span>
      <span class="pill pill-off">LEVEL 4</span>
    </div>
  </section>
</main>
<script>
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function unlockAudio(){if(audioCtx.state==="suspended")audioCtx.resume().catch(()=>{})}
function blip(freq,type,duration,volume=.05){
  unlockAudio();
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type=type;
  osc.frequency.value=freq;
  gain.gain.setValueAtTime(volume,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+duration);
  osc.start();
  osc.stop(audioCtx.currentTime+duration);
}
const sfx={
  tap:()=>blip(420,"triangle",.05,.035),
  open:()=>{blip(520,"triangle",.06,.04);setTimeout(()=>blip(680,"triangle",.08,.04),60);}
};
document.addEventListener("pointerdown",unlockAudio,{once:true});
[...document.querySelectorAll(".pill")].forEach(button=>{
  button.addEventListener("pointerdown",()=>sfx.tap());
  if(button.tagName==="A"&&!button.classList.contains("pill-off")){
    button.addEventListener("click",()=>sfx.open());
  }
});
</script>
</body>
</html>
