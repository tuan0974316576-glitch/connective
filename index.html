<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#7f9c96">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-512-maskable.png" type="image/png">
<link rel="apple-touch-icon" href="./icon-512-maskable.png">
<title>DSE Connective App</title>
<style>
:root{
  --bg:#f7f3eb;
  --panel:#fffdf8;
  --ink:#24313a;
  --muted:#6d7b80;
  --line:#ddd4c5;
  --sage:#7f9c96;
  --sage-deep:#5e7772;
  --pink:#e7d6d0;
  --cream:#f4ecde;
  --white:#ffffff;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  font-family:"Segoe UI","Noto Sans TC",sans-serif;
  background:
    radial-gradient(circle at top left,rgba(231,214,208,.55),transparent 34%),
    linear-gradient(180deg,#fbf8f2 0%,#f3eee4 100%);
  color:var(--ink);
  padding:14px;
}
.app{
  width:min(460px,100%);
  margin:0 auto;
}
.hero{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:28px;
  padding:20px;
  box-shadow:0 14px 30px rgba(60,66,70,.08);
}
.eyebrow{
  display:inline-block;
  padding:7px 12px;
  border-radius:999px;
  background:var(--cream);
  color:var(--sage-deep);
  font-size:11px;
  font-weight:900;
  letter-spacing:.08em;
}
h1{
  margin:12px 0 6px;
  font-size:34px;
  line-height:1.02;
  font-weight:900;
}
.sub{
  margin:0;
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}
.grid{
  display:grid;
  gap:12px;
  margin-top:14px;
}
.card{
  display:block;
  text-decoration:none;
  color:inherit;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:24px;
  padding:16px;
  box-shadow:0 10px 24px rgba(60,66,70,.06);
}
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}
.tag{
  display:inline-block;
  min-width:64px;
  padding:6px 10px;
  border-radius:999px;
  background:var(--sage);
  color:#fff;
  font-size:11px;
  font-weight:900;
  text-align:center;
}
.tag.soft{
  background:var(--pink);
  color:#6f5650;
}
.title{
  margin:10px 0 0;
  font-size:22px;
  font-weight:900;
}
.desc{
  margin:8px 0 0;
  color:var(--muted);
  font-size:13px;
  line-height:1.55;
}
.arrow{
  font-size:20px;
  color:var(--sage-deep);
  font-weight:900;
}
.card.disabled{
  opacity:.58;
}
.footer{
  margin-top:12px;
  padding:14px 16px;
  border-radius:20px;
  background:rgba(255,253,248,.78);
  border:1px solid var(--line);
  color:var(--muted);
  font-size:12px;
  line-height:1.6;
}
strong{font-weight:900}
@media(min-width:700px){
  body{padding:24px}
  .app{width:min(980px,100%)}
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
</style>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("./service-worker.js").catch(()=>{})});
}
</script>
</head>
<body>
<main class="app">
  <section class="hero">
    <span class="eyebrow">MAIN MENU</span>
    <h1><strong>DSE</strong><br><strong>Connective</strong></h1>
    <p class="sub">手機優先。簡潔。直接開始。</p>
  </section>

  <section class="grid">
    <a class="card" href="./revision.html">
      <div class="card-top">
        <span class="tag soft">NOTE</span>
        <span class="arrow">›</span>
      </div>
      <p class="title"><strong>溫習表</strong></p>
      <p class="desc">note card + 例句</p>
    </a>

    <a class="card" href="./level1.html">
      <div class="card-top">
        <span class="tag">LEVEL 1</span>
        <span class="arrow">›</span>
      </div>
      <p class="title"><strong>選擇題</strong></p>
      <p class="desc">中文 → 揀英文</p>
    </a>

    <a class="card" href="./eng_game_connectives.html">
      <div class="card-top">
        <span class="tag">LEVEL 2</span>
        <span class="arrow">›</span>
      </div>
      <p class="title"><strong>直接打字</strong></p>
      <p class="desc">中文 → 打英文</p>
    </a>

    <div class="card disabled">
      <div class="card-top">
        <span class="tag soft">LEVEL 3</span>
        <span class="arrow">…</span>
      </div>
      <p class="title"><strong>句子選擇</strong></p>
      <p class="desc">English sentence → 揀 connectives</p>
    </div>

    <div class="card disabled">
      <div class="card-top">
        <span class="tag soft">LEVEL 4</span>
        <span class="arrow">…</span>
      </div>
      <p class="title"><strong>句子填空</strong></p>
      <p class="desc">English sentence → 填答案</p>
    </div>
  </section>

  <section class="footer">
    <strong>App feel</strong>：加到主畫面後會更似原生 app。
  </section>
</main>
</body>
</html>
