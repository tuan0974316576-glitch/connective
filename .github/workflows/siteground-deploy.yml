name: Deploy to SiteGround

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SG_SSH_PRIVATE_KEY }}" > ~/.ssh/siteground_key
          chmod 600 ~/.ssh/siteground_key
          cat > ~/.ssh/askpass.sh <<'EOF'
          #!/usr/bin/env bash
          printf "%s" "${SG_SSH_PASSPHRASE}"
          EOF
          chmod 700 ~/.ssh/askpass.sh
          ssh-keyscan -p "${{ secrets.SG_PORT }}" "${{ secrets.SG_HOST }}" >> ~/.ssh/known_hosts
        env:
          SG_SSH_PASSPHRASE: ${{ secrets.SG_SSH_PASSPHRASE }}

      - name: Ensure remote directory exists
        shell: bash
        run: |
          eval "$(ssh-agent -s)"
          export SSH_ASKPASS=~/.ssh/askpass.sh
          export SSH_ASKPASS_REQUIRE=force
          export DISPLAY=:0
          setsid ssh-add ~/.ssh/siteground_key < /dev/null
          ssh -p "${{ secrets.SG_PORT }}" "${{ secrets.SG_USER }}@${{ secrets.SG_HOST }}" "mkdir -p '${{ secrets.SG_REMOTE_PATH }}'"
        env:
          SG_SSH_PASSPHRASE: ${{ secrets.SG_SSH_PASSPHRASE }}

      - name: Upload site files
        shell: bash
        run: |
          eval "$(ssh-agent -s)"
          export SSH_ASKPASS=~/.ssh/askpass.sh
          export SSH_ASKPASS_REQUIRE=force
          export DISPLAY=:0
          setsid ssh-add ~/.ssh/siteground_key < /dev/null
          rsync -avz --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".tmp.driveupload/" \
            --exclude "desktop.ini" \
            --exclude "*.ps1" \
            -e "ssh -p ${{ secrets.SG_PORT }}" \
            ./ "${{ secrets.SG_USER }}@${{ secrets.SG_HOST }}:${{ secrets.SG_REMOTE_PATH }}/"
        env:
          SG_SSH_PASSPHRASE: ${{ secrets.SG_SSH_PASSPHRASE }}
