<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#4ecdc4">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-512-maskable.png" type="image/png">
<link rel="apple-touch-icon" href="./icon-512-maskable.png">
<title>DSE 溫習表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Zen+Maru+Gothic:wght@500;700&display=swap');
:root{
  --base-bg:#fdfbf7;
  --primary:#4ecdc4;
  --primary-dark:#2cb5ac;
  --secondary:#ffe66d;
  --secondary-dark:#ffb703;
  --text:#444444;
  --muted:#666;
  --line:#d1d8e0;
  --panel:#ffffff;
  --soft-blue:#e0fbfc;
  --soft-pink:#fff5f5;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden}
body{
  font-family:"M PLUS Rounded 1c","Zen Maru Gothic","Hiragino Kaku Gothic ProN",sans-serif;
  background:var(--base-bg);
  color:var(--text);
  padding:14px;
}
.app{
  width:min(560px,100%);
  margin:0 auto;
  height:calc(100vh - 28px);
  display:flex;
  flex-direction:column;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}
.back,.close-btn{
  display:inline-flex;
  justify-content:center;
  align-items:center;
  width:44px;
  height:44px;
  border-radius:16px;
  border:2px dashed var(--line);
  background:#fff;
  color:var(--primary-dark);
  text-decoration:none;
  font-size:22px;
  font-weight:900;
  box-shadow:0 4px 0 #f0f0f0;
}
.top-actions{
  display:flex;
  align-items:center;
  gap:10px;
}
.count{
  padding:8px 14px;
  border-radius:999px;
  border:2px dashed var(--line);
  background:#fff;
  box-shadow:0 4px 0 #f0f0f0;
  font-size:12px;
  font-weight:900;
  color:var(--primary-dark);
}
.card{
  background:#fff;
  border:3px dashed var(--primary);
  border-radius:30px;
  box-shadow:0 0 0 6px #fff,0 10px 20px rgba(78,205,196,.15);
  padding:18px;
  transform-style:preserve-3d;
  backface-visibility:hidden;
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.card.is-entering-right{
  animation:flipInRight .42s ease;
}
.card.is-entering-left{
  animation:flipInLeft .42s ease;
}
.card.is-leaving-right{
  animation:flipOutRight .22s ease forwards;
}
.card.is-leaving-left{
  animation:flipOutLeft .22s ease forwards;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(10px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes flipOutLeft{
  from{opacity:1;transform:rotateY(0) translateX(0)}
  to{opacity:0;transform:rotateY(-18deg) translateX(-10px) scale(.98)}
}
@keyframes flipOutRight{
  from{opacity:1;transform:rotateY(0) translateX(0)}
  to{opacity:0;transform:rotateY(18deg) translateX(10px) scale(.98)}
}
@keyframes flipInRight{
  from{opacity:0;transform:rotateY(18deg) translateX(10px) scale(.98)}
  to{opacity:1;transform:rotateY(0) translateX(0) scale(1)}
}
@keyframes flipInLeft{
  from{opacity:0;transform:rotateY(-18deg) translateX(-10px) scale(.98)}
  to{opacity:1;transform:rotateY(0) translateX(0) scale(1)}
}
.answer{
  margin-top:12px;
  background:#fffdf5;
  border:2px dashed var(--secondary);
  border-radius:22px;
  padding:12px;
}
.note-label,.eg-label{
  display:inline-block;
  margin-bottom:8px;
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}
.note-label{
  background:var(--soft-blue);
  color:var(--primary-dark);
}
.eg-label{
  background:var(--soft-pink);
  color:#d15f5f;
}
.answer-text{
  font-size:17px;
  line-height:1.42;
  font-weight:900;
  color:var(--primary-dark);
}
.answer-zh{
  margin:0 0 6px;
  font-size:24px;
  line-height:1.14;
  font-weight:900;
  color:#8a6a00;
}
.answer-en{
  margin:0;
  font-size:17px;
  line-height:1.42;
  font-weight:900;
  color:var(--primary-dark);
}
.note{
  margin-top:10px;
  background:#fff;
  border:2px dashed var(--line);
  border-radius:22px;
  padding:12px;
  font-size:12px;
  line-height:1.55;
}
.examples{
  margin-top:10px;
  background:#fff;
  border:2px dashed var(--line);
  border-radius:22px;
  padding:12px;
  flex:1;
  min-height:0;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}
.group + .group{
  margin-top:10px;
  padding-top:10px;
  border-top:2px dashed #edf1f2;
}
.group-title{
  margin:0 0 8px;
  font-size:13px;
  font-weight:900;
  color:var(--primary-dark);
}
.en,.zh-line{
  margin:5px 0;
  font-size:12px;
  line-height:1.52;
}
.zh-line{color:var(--muted)}
.nav{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:10px;
}
.nav-btn{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  width:72px;
  height:72px;
  border:none;
  background:transparent;
  cursor:pointer;
  animation:floaty 1.6s ease-in-out infinite;
  z-index:18;
  padding:0;
}
.nav-btn.left{left:10px}
.nav-btn.right{right:10px;animation-delay:.2s}
.nav-btn:active{
  transform:translateY(calc(-50% + 4px));
}
.nav-btn[hidden]{visibility:hidden}
.nav-btn svg{
  display:block;
  width:100%;
  height:100%;
  overflow:visible;
}
.nav-btn path{
  stroke:#8fd8e8;
  stroke-width:10;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
  filter:drop-shadow(0 2px 0 #ffffff) drop-shadow(0 0 8px rgba(143,216,232,.25));
}
@keyframes floaty{
  0%,100%{transform:translateY(-50%)}
  50%{transform:translateY(calc(-50% - 3px))}
}
.dots{
  display:flex;
  justify-content:center;
  gap:7px;
  padding:0 6px;
  overflow:hidden;
}
.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#d9e6e8;
  flex:0 0 auto;
}
.dot.active{
  width:20px;
  border-radius:999px;
  background:var(--primary);
}
.fab{
  position:fixed;
  right:16px;
  bottom:16px;
  width:48px;
  height:48px;
  border:4px dashed var(--primary);
  border-radius:50%;
  background:transparent;
  color:var(--primary-dark);
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 4px 12px rgba(78,205,196,.16);
  z-index:20;
  animation:floaty 1.6s ease-in-out infinite;
  transition:transform .18s ease,width .18s ease,height .18s ease,right .18s ease,bottom .18s ease,font-size .18s ease;
}
.fab.open{
  width:60px;
  height:60px;
  right:10px;
  bottom:10px;
  font-size:24px;
}
.fab:active{
  transform:translateY(4px);
  box-shadow:0 0 0 transparent;
}
.drawer{
  position:fixed;
  right:14px;
  bottom:88px;
  width:min(300px,calc(100vw - 28px));
  max-height:62vh;
  background:#fff;
  border:3px dashed var(--primary);
  border-radius:26px;
  box-shadow:0 0 0 6px #fff,0 12px 26px rgba(78,205,196,.18);
  overflow:hidden;
  display:none;
  z-index:25;
}
.drawer.open{
  display:flex;
  flex-direction:column;
  animation:drawerIn .24s ease;
}
@keyframes drawerIn{
  from{opacity:0;transform:translateY(12px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.drawer-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:14px 14px 10px;
  border-bottom:2px dashed #e8eeee;
}
.drawer-title{
  font-size:14px;
  font-weight:900;
  color:var(--primary-dark);
}
.drawer-close{
  width:34px;
  height:34px;
  border:none;
  border-radius:50%;
  background:#fff5f5;
  color:#d15f5f;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}
.drawer-list{
  overflow:auto;
  padding:10px;
  display:grid;
  gap:8px;
}
.drawer-item{
  width:100%;
  border:2px dashed var(--line);
  border-radius:18px;
  background:#fff;
  padding:10px 12px;
  text-align:left;
  font:inherit;
  color:var(--text);
  cursor:pointer;
  box-shadow:0 4px 0 #f0f0f0;
}
.drawer-item.active{
  background:var(--soft-blue);
  border-color:var(--primary);
  color:var(--primary-dark);
}
.drawer-item-id{
  display:block;
  font-size:11px;
  font-weight:900;
  color:var(--primary-dark);
  margin-bottom:3px;
}
.drawer-item-zh{
  display:block;
  font-size:14px;
  font-weight:900;
  line-height:1.35;
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(253,251,247,.58);
  display:none;
  z-index:24;
}
.overlay.open{
  display:block;
}
@media(min-width:700px){
  body{padding:24px}
  .app{height:calc(100vh - 48px)}
  .nav-btn.left{left:24px}
  .nav-btn.right{right:24px}
  .fab{
    right:24px;
    bottom:24px;
  }
  .drawer{
    right:24px;
    bottom:96px;
  }
}
</style>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("./service-worker.js").catch(()=>{})});
}
</script>
</head>
<body>
<main class="app">
  <div class="topbar">
    <a class="back" href="./index.html">‹</a>
    <div class="top-actions">
      <div id="count" class="count">1 / 1</div>
      <a class="close-btn" href="./index.html">×</a>
    </div>
  </div>

  <section id="card" class="card"></section>

  <section class="nav">
    <button id="prevBtn" class="nav-btn left" type="button" aria-label="上一張">
      <svg viewBox="0 0 80 80" aria-hidden="true">
        <path d="M50 16 L26 40 L50 64"></path>
      </svg>
    </button>
    <div id="dots" class="dots"></div>
    <button id="nextBtn" class="nav-btn right" type="button" aria-label="下一張">
      <svg viewBox="0 0 80 80" aria-hidden="true">
        <path d="M30 16 L54 40 L30 64"></path>
      </svg>
    </button>
  </section>
</main>
<div id="overlay" class="overlay"></div>
<aside id="drawer" class="drawer" aria-hidden="true">
  <div class="drawer-head">
    <div class="drawer-title">跳去連接詞</div>
    <button id="drawerClose" class="drawer-close" type="button">×</button>
  </div>
  <div id="drawerList" class="drawer-list"></div>
</aside>
<button id="drawerToggle" class="fab" type="button" aria-label="打開清單">▸</button>

<script>
const fallback={
  exp:"此連接詞已加入題庫，之後可再補更完整教學內容。",
  l4en:"Example will be added.",
  l4zh:"例句稍後補上。",
  l5en:"Advanced example will be added.",
  l5zh:"進階例句稍後補上。"
};
let bank=[];
let currentIndex=0;
let isAnimating=false;
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function unlockAudio(){if(audioCtx.state==="suspended")audioCtx.resume().catch(()=>{})}
function blip(freq,type,duration,volume=.055){
  unlockAudio();
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type=type;
  osc.frequency.value=freq;
  gain.gain.setValueAtTime(volume,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+duration);
  osc.start();
  osc.stop(audioCtx.currentTime+duration);
}
const sfx={
  tap:()=>blip(420,"triangle",.05,.03),
  flipLeft:()=>{blip(410,"triangle",.06,.04);setTimeout(()=>blip(320,"triangle",.08,.035),70)},
  flipRight:()=>{blip(410,"triangle",.06,.04);setTimeout(()=>blip(520,"triangle",.08,.035),70)},
  drawerOpen:()=>{blip(560,"triangle",.06,.04);setTimeout(()=>blip(740,"triangle",.08,.035),60)},
  drawerClose:()=>{blip(520,"triangle",.06,.035);setTimeout(()=>blip(360,"triangle",.08,.03),60)}
};
const $=id=>document.getElementById(id);

function splitEn(text){
  return (text||"").match(/[^.!?]+[.!?]+|[^.!?]+$/g)||[];
}
function splitZh(text){
  return (text||"").match(/[^。！？]+[。！？]+|[^。！？]+$/g)||[];
}
function escapeHtml(value){
  return String(value)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
function parseExamples(enText,zhText){
  const en=splitEn(enText).map(s=>s.trim()).filter(Boolean);
  const zh=splitZh(zhText).map(s=>s.trim()).filter(Boolean);
  const count=Math.max(en.length,zh.length);
  return Array.from({length:count},(_,idx)=>({en:en[idx]||"",zh:zh[idx]||""}));
}
async function loadBank(){
  const response=await fetch("./eng_game_connectives.html",{cache:"no-store"});
  const html=await response.text();
  const match=html.match(/(const bank=\[[\s\S]*?\];)\s*const fallback=/);
  if(!match) throw new Error("bank not found");
  return new Function(match[1] + "return bank;")();
}
function renderExamples(title,enText,zhText){
  const list=parseExamples(enText,zhText);
  return `
    <div class="group">
      <p class="group-title">${title}</p>
      ${list.map(item=>`<p class="en">${escapeHtml(item.en)}</p><p class="zh-line">${escapeHtml(item.zh)}</p>`).join("")}
    </div>
  `;
}
function renderDots(){
  const dots=$("dots");
  const maxDots=Math.min(bank.length,9);
  let start=0;
  if(bank.length>maxDots){
    start=Math.max(0,Math.min(currentIndex-4,bank.length-maxDots));
  }
  dots.innerHTML=Array.from({length:maxDots},(_,i)=>{
    const idx=start+i;
    return `<span class="dot ${idx===currentIndex?"active":""}"></span>`;
  }).join("");
}
function renderDrawer(){
  $("drawerList").innerHTML=bank.map((item,idx)=>`
    <button class="drawer-item ${idx===currentIndex?"active":""}" type="button" data-index="${idx}">
      <span class="drawer-item-id">${escapeHtml(String(item.id))}</span>
      <span class="drawer-item-zh">${escapeHtml(item.zh||"")}</span>
    </button>
  `).join("");
  [...$("drawerList").querySelectorAll(".drawer-item")].forEach(button=>{
    button.addEventListener("click",()=>{
      const target=Number(button.dataset.index);
      closeDrawer();
      jumpTo(target);
    });
  });
}
function renderCard(direction="right"){
  const data={...fallback,...bank[currentIndex]};
  const display=data.display||data.pattern||"";
  $("card").className=`card is-entering-${direction}`;
  $("card").innerHTML=`
    <section class="answer">
      <p class="answer-zh">${escapeHtml(data.zh||"")}</p>
      <p class="answer-en">${escapeHtml(display)}</p>
    </section>

    <section class="note">
      <span class="note-label">NOTE</span>
      <div>${escapeHtml(data.note||data.exp||"")}</div>
    </section>

    <section class="examples">
      <span class="eg-label">EXAMPLE</span>
      ${renderExamples("Level 4",data.l4en,data.l4zh)}
      ${renderExamples("Level 5",data.l5en,data.l5zh)}
    </section>
  `;
  $("count").textContent=`${currentIndex+1} / ${bank.length}`;
  $("prevBtn").hidden=currentIndex===0;
  $("nextBtn").hidden=currentIndex===bank.length-1;
  renderDots();
  renderDrawer();
  setTimeout(()=>{
    $("card").className="card";
    isAnimating=false;
  },420);
}
function animateTo(next,direction){
  if(isAnimating||next<0||next>=bank.length) return;
  isAnimating=true;
  direction==="right"?sfx.flipRight():sfx.flipLeft();
  $("card").className=`card is-leaving-${direction}`;
  setTimeout(()=>{
    currentIndex=next;
    renderCard(direction);
  },180);
}
function go(step){
  const next=currentIndex+step;
  if(next<0||next>=bank.length) return;
  animateTo(next,step>0?"right":"left");
}
function jumpTo(target){
  if(target===currentIndex||target<0||target>=bank.length) return;
  animateTo(target,target>currentIndex?"right":"left");
}
function openDrawer(){
  sfx.drawerOpen();
  $("drawer").classList.add("open");
  $("overlay").classList.add("open");
  $("drawer").setAttribute("aria-hidden","false");
  $("drawerToggle").textContent="▾";
  $("drawerToggle").classList.add("open");
}
function closeDrawer(){
  if($("drawer").classList.contains("open")) sfx.drawerClose();
  $("drawer").classList.remove("open");
  $("overlay").classList.remove("open");
  $("drawer").setAttribute("aria-hidden","true");
  $("drawerToggle").textContent="▸";
  $("drawerToggle").classList.remove("open");
}
function toggleDrawer(){
  if($("drawer").classList.contains("open")) closeDrawer();
  else openDrawer();
}
$("prevBtn").addEventListener("click",()=>go(-1));
$("nextBtn").addEventListener("click",()=>go(1));
$("drawerToggle").addEventListener("click",toggleDrawer);
$("drawerClose").addEventListener("click",closeDrawer);
$("overlay").addEventListener("click",closeDrawer);
document.addEventListener("pointerdown",unlockAudio,{once:true});
document.addEventListener("click",event=>{
  const target=event.target;
  if(target.closest(".back")||target.closest(".close-btn")||target.closest(".drawer-item")){
    sfx.tap();
  }
});
document.addEventListener("keydown",event=>{
  if(event.key==="ArrowLeft") go(-1);
  if(event.key==="ArrowRight") go(1);
  if(event.key==="Escape") closeDrawer();
});
loadBank()
  .then(items=>{
    bank=items;
    renderCard();
  })
  .catch(()=>{
    $("card").innerHTML=`<h1 class="zh">載入失敗</h1>`;
    $("prevBtn").hidden=true;
    $("nextBtn").hidden=true;
    $("drawerToggle").hidden=true;
  });
</script>
</body>
</html>
