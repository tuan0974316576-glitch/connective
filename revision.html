<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#7f9c96">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-512-maskable.png" type="image/png">
<link rel="apple-touch-icon" href="./icon-512-maskable.png">
<title>DSE 溫習表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Zen+Maru+Gothic:wght@500;700&display=swap');
:root{
  --base-bg:#fdfbf7;
  --primary:#4ecdc4;
  --primary-dark:#2cb5ac;
  --secondary:#ffe66d;
  --secondary-dark:#ffb703;
  --text:#444444;
  --muted:#666;
  --line:#d1d8e0;
  --panel:#ffffff;
  --soft-blue:#e0fbfc;
  --soft-pink:#fff5f5;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  -webkit-tap-highlight-color:transparent;
  font-family:"M PLUS Rounded 1c","Zen Maru Gothic","Hiragino Kaku Gothic ProN",sans-serif;
  background:var(--base-bg);
  color:var(--text);
  padding:14px;
}
.app{width:min(560px,100%);margin:0 auto}
.top{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:12px;
}
.back{
  display:inline-flex;
  justify-content:center;
  align-items:center;
  width:44px;
  height:44px;
  border-radius:16px;
  border:2px dashed var(--line);
  background:#fff;
  color:var(--primary-dark);
  text-decoration:none;
  font-size:22px;
  font-weight:900;
  box-shadow:0 4px 0 #f0f0f0;
}
.hero{
  background:var(--panel);
  border:3px dashed var(--primary);
  border-radius:28px;
  padding:18px;
  box-shadow:0 0 0 6px #fff,0 10px 20px rgba(78,205,196,.15);
}
.eyebrow{
  display:inline-block;
  padding:7px 12px;
  border-radius:999px;
  background:#fffdf5;
  color:var(--primary-dark);
  font-size:11px;
  font-weight:900;
  letter-spacing:.08em;
}
h1{
  margin:12px 0 6px;
  font-size:30px;
  line-height:1.08;
  color:var(--primary-dark);
}
.sub{
  margin:0;
  color:#666;
  font-size:13px;
  line-height:1.55;
}
.search{
  width:100%;
  margin:12px 0;
  padding:14px 16px;
  border-radius:20px;
  border:2px dashed var(--line);
  background:#fff;
  font-size:16px;
  box-shadow:0 4px 0 #f0f0f0;
}
.list{
  display:grid;
  gap:12px;
}
.card{
  background:#fff;
  border:2px dashed var(--line);
  border-radius:24px;
  padding:16px;
  box-shadow:0 4px 0 #f0f0f0;
}
.head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}
.id{
  min-width:56px;
  padding:6px 10px;
  border-radius:999px;
  background:var(--primary);
  color:#fff;
  text-align:center;
  font-size:11px;
  font-weight:900;
}
.zh{
  margin:10px 0 4px;
  font-size:23px;
  line-height:1.16;
  font-weight:900;
  color:var(--primary-dark);
}
.pattern{
  color:#666;
  font-size:13px;
  line-height:1.5;
}
.answer{
  margin-top:12px;
  padding:12px 14px;
  background:#fffdf5;
  border:2px dashed var(--secondary);
  border-radius:20px;
  font-size:17px;
  line-height:1.5;
  color:var(--primary-dark);
}
.note{
  margin-top:10px;
  color:#666;
  font-size:13px;
  line-height:1.6;
}
details{
  margin-top:12px;
  border:2px dashed #d1d8e0;
  border-radius:18px;
  background:#fff;
  overflow:hidden;
}
summary{
  list-style:none;
  cursor:pointer;
  padding:13px 14px;
  font-size:14px;
  font-weight:900;
  color:var(--primary-dark);
}
summary::-webkit-details-marker{display:none}
.examples{
  padding:0 14px 14px;
}
.group{
  padding-top:6px;
}
.group strong{
  display:block;
  margin-bottom:6px;
  color:var(--primary-dark);
}
.group p{
  margin:6px 0;
  font-size:13px;
  line-height:1.6;
}
.zh-line{color:#666}
.empty{
  display:none;
  text-align:center;
  padding:18px;
  color:#666;
}
strong{font-weight:900}
</style>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("./service-worker.js").catch(()=>{})});
}
</script>
</head>
<body>
<main class="app">
  <div class="top">
    <a class="back" href="./index.html">‹</a>
  </div>

  <section class="hero">
    <span class="eyebrow">NOTE CARD</span>
    <h1><strong>溫習表</strong></h1>
    <p class="sub">卡片先睇重點。例句再展開。</p>
  </section>

  <input id="search" class="search" type="search" placeholder="搜尋中文 / 英文">
  <section id="list" class="list"></section>
  <section id="empty" class="empty">找不到結果</section>
</main>

<script>
const fallback={
  exp:"此連接詞已加入題庫，之後可再補更完整教學內容。",
  l4en:"Example will be added.",
  l4zh:"例句稍後補上。",
  l5en:"Advanced example will be added.",
  l5zh:"進階例句稍後補上。"
};

function splitEn(text){
  return (text||"").match(/[^.!?]+[.!?]+|[^.!?]+$/g)||[];
}

function splitZh(text){
  return (text||"").match(/[^。！？]+[。！？]+|[^。！？]+$/g)||[];
}

function parseExamples(enText,zhText){
  const en=splitEn(enText).map(s=>s.trim()).filter(Boolean);
  const zh=splitZh(zhText).map(s=>s.trim()).filter(Boolean);
  const count=Math.max(en.length,zh.length);
  return Array.from({length:count},(_,idx)=>({en:en[idx]||"",zh:zh[idx]||""}));
}

function escapeHtml(value){
  return String(value)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

async function loadBank(){
  const response=await fetch("./eng_game_connectives.html",{cache:"no-store"});
  const html=await response.text();
  const match=html.match(/(const bank=\[[\s\S]*?\];)\s*const fallback=/);
  if(!match) throw new Error("bank not found");
  return new Function(match[1] + "return bank;")();
}

function renderGroup(title,enText,zhText){
  const items=parseExamples(enText,zhText).map(item=>`
    <p>${escapeHtml(item.en)}</p>
    <p class="zh-line">${escapeHtml(item.zh)}</p>
  `).join("");
  return `<div class="group"><strong>${title}</strong>${items}</div>`;
}

function renderCards(items){
  const list=document.getElementById("list");
  list.innerHTML=items.map(item=>{
    const data={...fallback,...item};
    const display=data.display||data.pattern||"";
    return `
      <article class="card" data-search="${escapeHtml([
        data.zh,data.pattern,data.display,data.note,data.exp,data.l4en,data.l4zh,data.l5en,data.l5zh
      ].join(" ").toLowerCase())}">
        <div class="head">
          <div>
            <div class="id">${escapeHtml(String(data.id))}</div>
            <div class="zh">${escapeHtml(data.zh||"")}</div>
            <div class="pattern">${escapeHtml(data.pattern||"")}</div>
          </div>
        </div>
        <div class="answer"><strong>${escapeHtml(display)}</strong></div>
        <div class="note">${escapeHtml(data.note||data.exp||"")}</div>
        <details>
          <summary>例句</summary>
          <div class="examples">
            ${renderGroup("Level 4",data.l4en,data.l4zh)}
            ${renderGroup("Level 5",data.l5en,data.l5zh)}
          </div>
        </details>
      </article>
    `;
  }).join("");
}

function attachSearch(){
  const input=document.getElementById("search");
  const cards=[...document.querySelectorAll(".card")];
  const empty=document.getElementById("empty");
  input.addEventListener("input",()=>{
    const keyword=input.value.trim().toLowerCase();
    let shown=0;
    cards.forEach(card=>{
      const visible=!keyword || card.dataset.search.includes(keyword);
      card.style.display=visible?"block":"none";
      if(visible) shown++;
    });
    empty.style.display=shown?"none":"block";
  });
}

loadBank()
  .then(items=>{
    renderCards(items);
    attachSearch();
  })
  .catch(()=>{
    document.getElementById("empty").style.display="block";
    document.getElementById("empty").textContent="載入失敗";
  });
</script>
</body>
</html>
