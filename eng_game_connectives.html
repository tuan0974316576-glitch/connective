:root{--bg:#f1f3f3;--p:#0a9396;--pd:#005f73;--s:#2d6a4f;--bd:#ced4da;--ok:#d1e7dd;--bad:#f8d7da;--danger:#dc3545;--card:#e6f1f0}html,body{height:100%;margin:0;overflow:hidden}body{font-family:"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);display:flex;justify-content:center;align-items:center}.wrap{width:min(980px,100%);max-height:98vh;overflow:auto;background:#fff;border:2px solid var(--bd);border-radius:12px;box-sizing:border-box;padding:20px}h1{text-align:center;color:var(--pd);margin:0 0 14px}.bar{display:flex;gap:10px;align-items:center;font-weight:700;color:#555}.timer{flex:1;height:20px;background:#e9ecef;border-radius:10px;overflow:hidden;position:relative}.fill{position:absolute;inset:0 auto 0 0;width:100%;background:var(--p)}.tt{position:relative;z-index:1;display:block;text-align:center;line-height:20px;color:#fff;font-size:12px}.tip{text-align:center;color:var(--danger);font-size:12px;margin:10px 0 14px;font-weight:700}.prompt{background:#e6eaea;border-left:6px solid var(--p);border-radius:8px;padding:18px;margin-bottom:12px}.main{font-size:30px;font-weight:900;text-align:center;margin:0}.sub{text-align:center;margin:10px 0 0;color:#4d4d4d;font-size:15px}.box,.teach{background:var(--card);border-radius:8px;padding:16px}.lab{display:block;font-size:14px;font-weight:700;color:var(--pd);margin-bottom:8px}.input-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}input{width:100%;box-sizing:border-box;border:2px solid var(--bd);border-radius:8px;padding:12px;font-size:24px;text-align:center;font-weight:600}input.ok{background:var(--ok);border-color:var(--p);color:var(--p)}input.bad{background:var(--bad);border-color:var(--danger);color:var(--danger)}.note{display:none;margin-top:10px;padding:10px 12px;background:#fff;border:1px dashed #bfd3d6;border-radius:8px;font-size:14px;line-height:1.6;min-height:44px}.ans{display:block;margin-top:8px;text-align:center;color:var(--danger);font-weight:700}.teach{display:none;margin-top:12px}.teach h3{margin:0 0 10px;color:var(--pd)}.exp{background:#fff;border-left:4px solid var(--p);padding:10px 12px;border-radius:6px;font-size:14px;line-height:1.7;margin-bottom:10px}.eg{background:#fff;padding:10px 12px;border-radius:6px;margin-bottom:10px}.eg strong{color:var(--pd)}.eg p{margin:6px 0;font-size:14px;line-height:1.7}.ctrl,.rctrl{display:flex;gap:10px;justify-content:space-between;margin-top:18px}.btn,.rbtn{border:none;border-radius:8px;padding:12px 18px;font-weight:700;font-size:16px;cursor:pointer}.back,.menu{background:#fff;color:var(--p);border:2px solid var(--p)}.check{background:var(--p);color:#fff}.next,.restart{background:var(--s);color:#fff}.retry{background:#e9c46a;color:#333;border:2px solid #d4a373}.end{display:none;text-align:center}.score{font-size:40px;font-weight:900;color:var(--s);margin:20px 0;border:4px solid #40916c;padding:20px;display:inline-block;border-radius:8px;background:var(--card)}.analysis{text-align:left;border-top:2px solid var(--bd);padding-top:20px;max-height:50vh;overflow:auto}.item{margin-bottom:15px;padding:12px;border-left:4px solid var(--danger);background:#fff5f5;border-radius:4px}.title{font-weight:700;margin-bottom:6px}.row{font-size:14px;background:rgba(255,255,255,.6);padding:6px 8px;border-radius:6px;margin-bottom:6px}@media(max-width:700px){body{align-items:flex-start;background:#fff}.wrap{height:100%;max-height:100%;border:none;border-radius:0;padding:15px}.main{font-size:22px}.ctrl,.rctrl{gap:8px}.btn,.rbtn{flex:1;min-width:0;padding:12px 8px;font-size:14px}input{font-size:18px}.input-grid{grid-template-columns:1fr}}

<div class="tip">每題要填完所有答案；答啱或答錯都會顯示解釋同 DSE 例句</div>

<script>
const bank=[
{id:1,zh:"因為 + 句子",pattern:"連接完整子句",answers:["since","as","because","mainly because","partly because","simply because"],display:"Since / As / Because / mainly because / partly because / simply because",note:"Because 最直接；作文可視語氣改用 mainly because / partly because / simply because。",exp:"Since / As / Because 都可接完整句子。DSE 作文想寫得成熟一點，可以用 mainly because、partly because、simply because 去微調語氣。",l4en:"Many students fail to exercise mainly because they have too much homework. As the deadline is approaching, we should finish the project as soon as possible.",l4zh:"許多學生沒運動，主要是因為功課太多。由於截止日期臨近，我們應盡快完成項目。",l5en:"Since the local property market is notoriously prohibitive, the younger generation is therefore forced to postpone their traditional milestones of success. The 'lying flat' movement has gained traction partly because the social ladder appears increasingly difficult to climb for those without a silver spoon in their mouths.",l5zh:"由於本地房地產市場價格高得驚人，年輕一代因此被迫推遲實現傳統的成功目標。『躺平』運動之所以受到關注，部分原因是對於那些並非出身富貴的人來說，社會階梯似乎越來越難攀登。"},
{id:2,zh:"因為 + 名詞",pattern:"後面接名詞或 noun phrase",answers:["due to","thanks to","because of"],display:"Due to / Thanks to / Because of",note:"Due to 常見於公函；Thanks to 多指正面原因；Because of 最常用。",exp:"呢組後面要接名詞或名詞片語。Due to 較正式，Thanks to 多數表示正面原因，Because of 最中性、最常用。",l4en:"The football match was cancelled due to the heavy rain. Thanks to his hard work, he passed the exam with flying colours.",l4zh:"由於大雨，足球比賽取消了。多虧了他的努力，他以優異成績通過了考試。",l5en:"Due to the exponential growth of fast fashion, the environmental toll on our planet has reached a critical tipping point. Because of the deep-seated societal expectation to excel academically, many Hong Kong students suffer from suffocating levels of stress.",l5zh:"由於快時尚的指數級增長，地球承擔的環境代價已達到臨界點。由於社會根深蒂固對學業卓越的期望，許多香港學生承受著窒息般的壓力。"},
{id:3,zh:"因此 / 所以",pattern:"and therefore / Thus / Hence / As a result / therefore",answers:["and therefore","thus","hence","as a result","therefore"],display:"and therefore / Thus / Hence / As a result / therefore",note:"Therefore 可作句中副詞，例如 Many people will therefore leave.",exp:"Thus、Hence、As a result、Therefore 都用來引出結果。Therefore 特別常見於正式文體，也可放句中作副詞，例如 Many people are therefore willing to...。",l4en:"The internet is very convenient; thus, we can buy everything online. He didn't study hard; hence, he failed the test.",l4zh:"網絡非常方便；因此，我們可以在網上購買任何東西。他不努力學習；因此，他考試不及格。",l5en:"Degree holders have become a dime a dozen in the current labour market; it is therefore no easy feat for graduates to secure a high-paying job. Global inflation has caused supply chain disruptions; hence, the cost of living in Hong Kong has soared to an unprecedented level.",l5zh:"學位持有者在當前勞動力市場已隨處可見；畢業生要獲得一份高薪工作因此並非易事。全球通脹導致供應鏈中斷；因此，香港的生活成本已飆升至前所未有的水平。"},
{id:4,zh:"目的是",pattern:"表目的",answers:["so that"],display:"so that",note:"後面接完整句子。",exp:"So that 用來表達『為的是 / 以便』，後面通常接 can / could / may / might 之類的子句。",l4en:"I save money so that I can buy a new laptop next month. Students study until late at night so that they can get into a prestigious university.",l4zh:"我存錢是為了下個月能買一台新電腦。學生學習到深夜，是為了能考進名牌大學。",l5en:"The government should implement rental control so that grassroots families can afford a decent living environment. Corporations should provide more flexible working hours so that their employees are capable of maintaining a healthy work-life balance.",l5zh:"政府應實行租金管制，以便基層家庭能負擔得起體面的居住環境。企業應提供更靈活的工作時間，使員工能夠保持健康的平衡工作與生活。"},
{id:5,zh:"形容詞 + 到...",pattern:"so + adjective + that",answers:["so adjective that"],display:"so + adjective + that",note:"核心結構是 so + 形容詞 + that。",exp:"呢個係結果句型，意思係『如此……以至於……』。答題時記住核心骨架係 so + adjective + that。",l4en:"The food was so delicious that I finished it in five minutes. The exam was so difficult that many students couldn't finish the papers.",l4zh:"食物太好吃了，我五分鐘就吃完了。考試太難了，許多學生沒能做完試卷。",l5en:"The housing crisis in Hong Kong is so severe that micro-apartments have become the only viable option for most first-time buyers. The influence of K-pop is so ubiquitous that it has fundamentally reshaped the aesthetic standards of the younger generation worldwide.",l5zh:"香港的住房危機如此嚴重，以至於微型公寓已成為大多數首置人士唯一可行的選擇。K-pop 的影響如此無孔不入，以至於它從根本上重塑了全球年輕一代的審美標準。"},
{id:6,zh:"雖然 + 句子",pattern:"讓步句",answers:["while","despite the fact that"],display:"While / Despite the fact that",note:"兩者都可接完整句子。",exp:"While 同 Despite the fact that 都可以接完整句子，表達『雖然』。正式寫作後者更長、更書面。",l4en:"While he likes playing sports, he does not like watching them on TV. Despite the fact that she was tired, she still finished her homework.",l4zh:"雖然他喜歡運動，但他不喜歡在電視上看運動比賽。儘管她很累，她還是完成了功課。",l5en:"While urban sports are gaining popularity among teenagers, the lack of professional facilities remains a significant hurdle for their long-term development. Despite the fact that Hong Kong is regarded as a global financial hub, the divide between the rich and the poor continues to widen exponentially.",l5zh:"雖然城市運動在青少年中日益普及，但專業設施的缺乏仍是其長期發展的重大障礙。儘管香港被視為全球金融中心，貧富差距卻繼續呈指數級擴大。"},
{id:7,zh:"雖然 + 名詞",pattern:"Despite + noun phrase",answers:["despite"],display:"Despite",note:"千萬不要寫 Despite + 句子。",exp:"Despite 後面只可接名詞、代名詞或 V-ing，不可直接接完整句子，呢點係 DSE 常見失分位。",l4en:"Despite the rain, they went hiking yesterday. He joined the competition despite his injury.",l4zh:"儘管下雨，他們昨天還是去行山了。儘管受傷，他還是參加了比賽。",l5en:"Despite the diverse opportunities provided by the digital era, many young adults still feel suffocated by traditional societal expectations. Success was achieved despite the numerous obstacles encountered during the initial stages of the project.",l5zh:"儘管數位時代提供了多元化的機會，許多青年仍對傳統的社會期望感到窒息。儘管在項目初期遇到了無數障礙，最終還是取得了成功。"},
{id:8,zh:"雖然 + 主語 + 形容詞",pattern:"Adj + as + subject + be",answers:["adjective as subject be"],display:"Adjective as Subject be",note:"例：Small as the room is, ...",exp:"呢個係倒裝讓步句型。形容詞要放前，再接 as + 主語 + be，語氣比 although / though 更成熟。",l4en:"Small as the room is, it is very comfortable. Hard as the work is, he never complains.",l4zh:"雖然房間很小，但很舒服。雖然工作辛苦，但他從不抱怨。",l5en:"Advanced as Hong Kong's infrastructure is, our city still struggles to accommodate the diverse needs of the ageing population. Promising as the new policy may be, its effectiveness largely depends on the government's determination to address the root of the problem.",l5zh:"雖然香港的基礎設施很先進，我們的城市在滿足老齡化人口的多元需求方面仍顯吃力。雖然新政策看起來很有前景，但其成效很大程度上取決於政府解決問題根源的決心。"},
{id:9,zh:"雖然這聽起來...",pattern:"Adj + as + subject + sounds",answers:["adjective as subject sounds"],display:"Adjective as Subject sounds",note:"反駁對方時特別好用。",exp:"想先承認對方說法『聽起來有道理』，再提出保留，就可以用 Adj + as + subject + sounds。",l4en:"Easy as it sounds, it is actually quite difficult to do. Good as the plan sounds, we don't have enough money to start it.",l4zh:"雖然聽起來容易，但做起來其實相當難。雖然計劃聽起來不錯，但我們沒有足夠的錢開始。",l5en:"Sensible as the 'minimalist lifestyle' sounds, it is often viewed by traditionalists as an excuse to avoid societal responsibilities. Utopian as a zero-waste society sounds, it is an essential goal we must strive for in order to preserve our environment.",l5zh:"雖然『極簡生活方式』聽起來很合理，但傳統主義者往往將其視為逃避社會責任的藉口。雖然零廢棄社會聽起來像烏托邦，但為了保護環境，這是我們必須努力奮鬥的必要目標。"},
{id:10,zh:"雖然這看起來...",pattern:"Adj + as + subject + looks",answers:["adjective as subject looks"],display:"Adjective as Subject looks",note:"用法同 sounds 類似，但改為 looks。",exp:"呢個結構專門用來講『雖然看起來……』，同樣屬於高階讓步倒裝句。",l4en:"Old as the building looks, it is very safe inside. Ordinary as the watch looks, it is very expensive.",l4zh:"雖然這座建築看起來很舊，但裡面很安全。雖然這隻手錶看起來很普通，但它非常昂貴。",l5en:"Insignificant as these minor lifestyle changes look, they can collectively lead to a substantial reduction in our city's carbon footprint. Flawless as the implementation of the new technology looks, hidden risks regarding data privacy cannot be ignored.",l5zh:"雖然這些微小的生活方式改變看起來微不足道，但它們合起來可以大幅減少我們城市的碳足跡。雖然新技術的實施看起來完美無缺，但有關數據隱私的隱藏風險不容忽視。"},
{id:11,zh:"另外 / 加上",pattern:"遞進補充",answers:["moreover","furthermore","in addition","on top of that","besides","what's more","whats more","plus"],display:"Moreover / Furthermore / In addition / On top of that / Besides / What's more / Plus",note:"書面文常用 Moreover / Furthermore / In addition。",exp:"呢組全部都係補充論點。正式作文優先用 Moreover / Furthermore / In addition；口語或較輕鬆文體可用 What's more / Plus。",l4en:"The new park provides a place for exercise. Moreover, it improves the air quality of the district. In addition, the government will provide subsidies for low-income families.",l4zh:"新公園提供了運動場所。此外，它還改善了該區的空氣品質。此外，政府將為低收入家庭提供補貼。",l5en:"The implementation of a four-day work week can boost employee morale; furthermore, it has the potential to enhance long-term productivity by reducing burnout. On top of the financial incentives, the program offers professional mentorship; moreover, it grants participants access to an exclusive global network.",l5zh:"實施每週四天工作制能提振員工士氣；此外，它還有望通過減少倦怠來提高長期生產力。除了經濟獎勵，該計畫還提供專業指導；此外，它還讓參與者能夠進入一個專屬的全球網絡。"},
{id:12,zh:"但是 / 儘管如此",pattern:"And yet / Nevertheless / Nonetheless / ; however,",answers:["and yet","nevertheless","nonetheless","however"],display:"And yet / Nevertheless / Nonetheless / however",note:"however 常配分號或句號；And yet 亦可用。",exp:"And yet、Nevertheless、Nonetheless、however 都係較正式的轉折語。要留意 however 常見於 '; however,' 或句首。",l4en:"The task was difficult. Nevertheless, he managed to complete it on time. She studied very hard; however, she didn't get the result she expected.",l4zh:"任務很困難。儘管如此，他還是設法準時完成了。她學習非常努力；然而，她沒有得到預期的結果。",l5en:"The statistical data suggests a slight economic recovery; nonetheless, the underlying issues of wealth inequality remain largely unaddressed. The technology is undeniably innovative; nevertheless, its ethical implications regarding privacy have sparked intense public debate.",l5zh:"統計數據顯示經濟有輕微復甦；儘管如此，財富不平等的底層問題在很大程度上仍未得到解決。這項技術無疑是創新的；儘管如此，其涉及隱私的倫理影響卻引發了激烈的公眾辯論。"},
{id:13,zh:"話雖如此",pattern:"先讓一步再反駁",answers:["be that as it may","that said","having said that","with that said"],display:"Be that as it may / That said / Having said that / With that said",note:"議論文常用。",exp:"呢組通常用喺先承認某個觀點，再轉向另一角度。比單純 but 更成熟。",l4en:"I know you are busy. That said, you should still find time to rest. The movie was a bit long. With that said, the acting was excellent.",l4zh:"我知道你很忙。話雖如此，你還是應該找時間休息。電影有點長。話雖如此，演技非常出色。",l5en:"The city has made significant strides in green energy. Be that as it may, it is still heavily dependent on fossil fuels during peak hours. Online learning offers unprecedented flexibility. Having said that, the lack of face-to-face interaction can sometimes hinder the development of soft skills.",l5zh:"該城市在綠色能源方面取得了重大進展。話雖如此，在高峰時段它仍然嚴重依賴化石燃料。線上學習提供了前所未有的靈活性。話雖如此，缺乏面對面交流有時會阻礙軟技能的發展。"},
{id:14,zh:"就算 [事實]",pattern:"Even though",answers:["even though"],display:"Even though",note:"用於已知事實。",exp:"Even though 用來講已經存在、大家知道的事實。",l4en:"Even though it was raining, they decided to go for a walk. He is not happy even though he is very rich.",l4zh:"雖然下著雨，他們還是決定去散步。雖然他很有錢，但他並不快樂。",l5en:"Even though the government has introduced various cooling measures, the housing market remains overheated and inaccessible to many. The traditional handicraft continues to thrive even though mass-produced alternatives are widely available at a lower cost.",l5zh:"儘管政府推出了各項冷卻措施，房地產市場依然過熱，讓許多人望而卻步。儘管低廉的量產替代品隨處可見，傳統手工藝依然蓬勃發展。"},
{id:15,zh:"就算 [假設]",pattern:"Even if",answers:["even if"],display:"Even if",note:"用於假設情況。",exp:"Even if 係假設性『即使』，未必真係發生。",l4en:"Even if I win the lottery, I will still keep my job. We will go on the trip even if the weather is not perfect.",l4zh:"就算我中了彩票，我也還是會保留我的工作。即使天氣不完美，我們也會去旅行。",l5en:"Even if the project receives full funding, it will still take years of research to yield any tangible results. The plan is unlikely to succeed even if all stakeholders reach a consensus, as the external market conditions are too volatile.",l5zh:"即使該項目獲得全額資助，仍需要多年的研究才能產生任何實質性的成果。即使所有利益相關者達成共識，該計畫也不太可能成功，因為外部市場環境過於動盪。"},
{id:16,zh:"換句話說",pattern:"; in other words,",answers:["in other words"],display:"in other words",note:"前面常有分號或句號。",exp:"In other words 用來重述前句，令意思更清楚。",l4en:"He is a vegetarian; in other words, he doesn't eat meat. The exam was cancelled; in other words, we have more time to study.",l4zh:"他是素食主義者；換句話說，他不吃肉。考試取消了；換句話說，我們有更多時間學習。",l5en:"The company is undergoing a restructuring process; in other words, significant layoffs and departmental shifts are expected in the coming months. The policy aims to promote social mobility; in other words, it seeks to break the cycle of intergenerational poverty.",l5zh:"公司正在進行重組；換句話說，預計未來幾個月將出現大規模裁員和部門變動。該政策旨在促進社會流動；換句話說，它試圖打破跨代貧窮的循環。"},
{id:17,zh:"更不用說",pattern:"Not to mention",answers:["not to mention"],display:"not to mention",note:"可接名詞，或 not to mention the fact that + 句子。",exp:"Not to mention 用來再加一個更強的補充點，語氣有『更何況』意味。",l4en:"She can speak English and French, not to mention Cantonese. The hotel is expensive, not to mention the extra cost of meals.",l4zh:"她會說英語和法語，更不用說廣東話了。這間酒店很貴，更不用說額外的餐費了。",l5en:"The proposal lacks a clear timeline and a realistic budget, not to mention the fact that it fails to address the concerns of local residents. The hike is physically demanding and dangerous, not to mention the unpredictable weather conditions in the mountains.",l5zh:"該提案缺乏明確的時間表和現實的預算，更不用說它未能解決當地居民的擔憂這一事實。這次健行體力消耗大且危險，更不用說山中變化莫測的天氣狀況了。"},
{id:18,zh:"簡單來說",pattern:"To put it simply / Simply put",answers:["to put it simply","simply put"],display:"To put it simply / Simply put",note:"適合總結複雜概念。",exp:"當你想將複雜概念用簡單方法重述，就可以用呢組。",l4en:"Simply put, we need more money to finish the project. To put it simply, the new app is designed to help you save time.",l4zh:"簡單來說，我們需要更多錢來完成項目。簡單來說，這款新應用旨在幫你節省時間。",l5en:"The economic theory is incredibly complex; simply put, it argues that consumer confidence is the primary driver of growth. To put it simply, the success of the environmental campaign hinges on individual participation rather than government legislation alone.",l5zh:"這個經濟理論非常複雜；簡單來說，它主張消費者信心是增長的主要動力。簡單來說，環保運動的成功取決於個人的參與，而不僅僅是政府的立法。"},
{id:19,zh:"不用說也知道",pattern:"It goes without saying that / Needless to say",answers:["it goes without saying that","needless to say"],display:"It goes without saying that / Needless to say",note:"用於明顯事實。",exp:"兩者都帶有『不言而喻』意思。It goes without saying that 後面直接接子句；Needless to say 常獨立放句首。",l4en:"Needless to say, we should always be polite to others. It goes without saying that health is more important than wealth.",l4zh:"不用說，我們應該始終對人有禮貌。不用說，健康比財富更重要。",l5en:"It goes without saying that the integration of artificial intelligence will fundamentally transform the global workforce. Needless to say, the reputation of the institution depends on the academic integrity of its students and faculty.",l5zh:"不用說，人工智能的整合將從根本上改變全球勞動力。不用說，機構的聲譽取決於其學生和教職員的學術誠信。"},
{id:20,zh:"亦即是說",pattern:"That is to say",answers:["that is to say"],display:"That is to say",note:"語氣較正式。",exp:"That is to say 係較正式的重述語，語氣比 in other words 再書面少少。",l4en:"She is very busy this week; that is to say, she cannot join our dinner. The store is closed on Sundays; that is to say, you should come on Saturday.",l4zh:"她這星期很忙；亦即是說，她不能參加我們的晚餐。這家店週日休息；亦即是說，你應該週六過來。",l5en:"The city's infrastructure is reaching its capacity; that is to say, immediate investment is required to avoid a systemic collapse. The research findings are inconclusive; that is to say, further investigation is needed before any definitive claims can be made.",l5zh:"城市的基礎設施正達到負荷極限；亦即是說，需要立即投資以避免系統性崩潰。研究結果尚無定論；亦即是說，在做出任何明確斷言之前需要進一步調查。"},
{id:21,zh:"無可否認的是",pattern:"It is undeniable that",answers:["it is undeniable that"],display:"It is undeniable that",note:"作文中可用來承認現象。",exp:"呢句最適合開頭承認一個公認現象，再慢慢展開論點。",l4en:"It is undeniable that technology has changed our lives in many ways. It is undeniable that learning a new language is beneficial for students.",l4zh:"無可否認，科技在許多方面改變了我們的生活。無可否認，學習一門新語言對學生是有益的。",l5en:"It is undeniable that the rapid expansion of social media has fundamentally altered the way individuals perceive self-worth and social validation. It is undeniable that the erosion of traditional cultural heritage is an inevitable byproduct of globalization, unless proactive preservation measures are taken.",l5zh:"無可否認，社交媒體的迅速擴張從根本上改變了個人看待自我價值和社會認可的方式。無可否認，除非採取積極的保護措施，否則傳統文化遺產的侵蝕是全球化必然的副產品。"},
{id:22,zh:"也",pattern:"Also / As well",answers:["also","as well"],display:"also / as well",note:"As well 常放句末。",exp:"Also 常放句中；as well 多數放句尾。兩者都表示『也』。",l4en:"He likes playing basketball and he also likes swimming. She decided to buy the red dress and the blue one as well.",l4zh:"他喜歡打籃球，也喜歡游泳。她決定買那件紅色的裙子，還有那件藍色的。",l5en:"The government should provide more financial support for startups; it is essential to cultivate a culture of innovation within the community as well. Implementing green policies can reduce pollution; such initiatives also serve to enhance the city's international reputation as a sustainable hub.",l5zh:"政府應為初創企業提供更多財政支持；在社區內培養創新文化也同樣至關重要。實施綠色政策可以減少污染；此類措施也有助於提升該城市作為可持續發展中心的國際聲譽。"},
{id:23,zh:"只要",pattern:"As long as",answers:["as long as"],display:"As long as",note:"表示條件成立即可。",exp:"As long as 用來表達『只要』，重點係條件一成立，結果就可以發生。",l4en:"You can go out to play as long as you finish your homework. We will win the game as long as we work together.",l4zh:"只要你做完功課，你就可以出去玩。只要我們合作，我們就會贏得比賽。",l5en:"As long as the underlying issues of systemic inequality remain unaddressed, social harmony will continue to be a distant goal. The digital economy will continue to flourish as long as there is robust protection for data privacy and intellectual property rights.",l5zh:"只要系統性不平等的底層問題未得到解決，社會和諧將永遠是一個遙遠的目標。只要有強大的數據隱私和知識產權保護，數字經濟就會繼續蓬勃發展。"},
{id:24,zh:"除非",pattern:"Unless",answers:["unless"],display:"Unless",note:"常譯作『如果不是』。",exp:"Unless 本身已經帶否定意思，所以通常後面唔需要再加 not。",l4en:"You will fail the exam unless you study hard starting from now. We cannot go for the picnic unless the rain stops.",l4zh:"除非你從現在開始努力學習，否則你考試會不及格。除非雨停了，否則我們不能去野餐。",l5en:"Unless the authorities take drastic measures to curb carbon emissions, the catastrophic effects of climate change will become irreversible. It is difficult for local small businesses to survive unless they undergo a digital transformation to meet the changing habits of modern consumers.",l5zh:"除非當局採取激烈措施遏制碳排放，否則氣候變化的災難性影響將變得不可逆轉。除非進行數位轉型以適應現代消費者不斷變化的習慣，否則本地小企業很難生存。"},
{id:25,zh:"畢竟",pattern:"After all",answers:["after all"],display:"after all",note:"可放句中或句尾補充理由。",exp:"After all 常用來補充一個大家都應該接受的理由，語氣自然。",l4en:"Don't be too hard on him; he is only a child after all. We should try our best; after all, we have nothing to lose.",l4zh:"別對他太苛刻；他畢竟只是個孩子。我們應該盡力而為；畢竟，我們沒什麼好損失的。",l5en:"Perfection is an unattainable ideal; after all, the beauty of any creative endeavour lies in its inherent human flaws. The success of a city should not be measured by its GDP alone; after all, the well-being and happiness of its citizens are far more telling.",l5zh:"完美是一個無法企及的理想；畢竟，任何創意活動的美感都在於其內在的人性瑕疵。一個城市的成功不應僅以國內生產總值來衡量；畢竟，市民的福祉和幸福感更能說明問題。"},
{id:26,zh:"正如上述",pattern:"As mentioned / As mentioned above",answers:["as mentioned","as mentioned above"],display:"As mentioned / As mentioned above",note:"公函或正式回覆常見。",exp:"As mentioned 較短；As mentioned above 更明確指前文。",l4en:"As mentioned, we will have a meeting tomorrow morning at 9 am. The cost is high, as mentioned above, so we need to save money.",l4zh:"正如剛才提到的，我們明天早上 9 點有個會議。正如上面提到的，成本很高，所以我們需要省錢。",l5en:"As mentioned in the previous section, the scarcity of land remains the primary catalyst for Hong Kong's skyrocketing property prices. The integration of AI into the curriculum, as mentioned above, requires extensive teacher training to ensure its pedagogical effectiveness.",l5zh:"正如前文段落所述，土地稀缺依然是香港房價飛漲的主要催化劑。正如上面提到的，將人工智能整合到課程中需要對教師進行廣泛培訓，以確保其教學成效。"},
{id:27,zh:"總括而言 [Informal]",pattern:"In a nutshell",answers:["in a nutshell"],display:"In a nutshell",note:"較口語，適合 informal writing。",exp:"In a nutshell 有『簡單總結』意味，適合較口語或輕鬆一點的結尾。",l4en:"In a nutshell, the trip was a total disaster from start to finish. In a nutshell, we need to work harder to achieve our goals.",l4zh:"總而言之，這次旅行從頭到尾都是一場災難。簡而言之，我們需要更努力才能實現目標。",l5en:"In a nutshell, the protagonist's journey is a profound exploration of existential loneliness in a rapidly urbanizing world. In a nutshell, the decline of brick-and-mortar stores is a direct consequence of the rise of e-commerce giants.",l5zh:"總括而言，主角的旅程是對快速都市化世界中存在主義孤獨的一次深刻探索。簡而言之，實體店的衰落是電子商務巨頭興起的直接結果。"},
{id:28,zh:"總括而言 [Formal]",pattern:"To conclude",answers:["to conclude"],display:"To conclude",note:"你提供的正式版主力用 To conclude。",exp:"正式結語建議主力記 To conclude，簡潔而穩陣。",l4en:"To conclude, I believe that everyone should play a part in environmental protection. To conclude, the benefits of regular exercise far outweigh the effort required.",l4zh:"總結來說，我認為每個人都應在環保中出一份力。總結來說，規律運動的好處遠遠超過所需的努力。",l5en:"To conclude, while the digital era has brought unprecedented convenience, it has simultaneously created a new set of psychological challenges for the younger generation. To conclude, a sustainable future hinges on a fundamental shift in our consumption habits and a global commitment to renewable energy.",l5zh:"總結來說，雖然數位時代帶來了前所未有的便利，但它同時也為年輕一代帶來了一系列新的心理挑戰。總結來說，可持續的未來取決於我們消費習慣的根本轉變，以及全球對可再生能源的承諾。"},
{id:29,zh:"小結",pattern:"From this line of thinking / In this sense / With this in mind",answers:["from this line of thinking","in this sense","with this in mind"],display:"From this line of thinking / In this sense / With this in mind",note:"適合正文段尾小結。",exp:"呢組適合每段尾聲小結，將上一段分析收束，再帶向下一步。",l4en:"With this in mind, we should choose the most experienced candidate. In this sense, the new policy is a good step towards fairness.",l4zh:"考慮到這一點，我們應該選擇最有經驗的候選人。在這個意義上，新政策是邁向公平的一大步。",l5en:"From this line of thinking, the primary function of education is not merely to transmit knowledge, but to foster critical thinking skills. With this in mind, the proposal to shorten working hours is not just about leisure, but about maximizing long-term human capital.",l5zh:"從這種思路來看，教育的主要功能不僅僅是傳遞知識，而是培養批判性思考能力。考慮到這一點，縮短工作時間的建議不僅關乎休閒，更關乎長期人力資本的最大化。"},
{id:30,zh:"首先",pattern:"To begin with / First of all",answers:["to begin with","first of all"],display:"To begin with / First of all",note:"正文第一段常用。",exp:"展開第一個重點時最實用，語氣清楚直接。",l4en:"First of all, I would like to thank you for inviting me today. To begin with, let's look at the background of this project.",l4zh:"首先，我想感謝你今天的邀請。首先，讓我們看看這個項目的背景。",l5en:"To begin with, it is imperative to recognize that the housing crisis is a multi-faceted problem that cannot be solved by a single policy alone. First of all, one must acknowledge the ethical complexities surrounding the use of facial recognition technology in public spaces.",l5zh:"首先，必須認識到住房危機是一個多方面的問題，無法僅靠單一政策解決。首先，必須承認在公共場所使用人臉識別技術所涉及的倫理複雜性。"},
{id:31,zh:"同樣值得留意的是",pattern:"It is equally worth noting that",answers:["it is equally worth noting that"],display:"It is equally worth noting that",note:"正文第二段常用。",exp:"適合用來承接第二個觀點，令段落層次更清楚。",l4en:"It is equally worth noting that the new library has a wide range of books. It is equally worth noting that social media can be a distraction for students.",l4zh:"同樣值得留意的是，新圖書館有很多種類的書籍。同樣值得留意的是，社交媒體可能會讓學生分心。",l5en:"It is equally worth noting that the surge in e-commerce has led to a significant increase in plastic waste from excessive packaging. It is equally worth noting that while the project aims to revitalize the district, it may inadvertently lead to the displacement of long-term residents.",l5zh:"同樣值得留意的是，電子商務的激增導致了過度包裝產生的塑料廢物大幅增加。同樣值得留意的是，雖然該項目旨在振興該區，但它可能會無意中導致長期居民的搬遷。"},
{id:32,zh:"最後但也同樣重要的是",pattern:"Last but not least",answers:["last but not least"],display:"Last but not least",note:"正文第三段常用。",exp:"最常用作第三點開首，意思是『最後但同樣重要』。",l4en:"Last but not least, we must remember to bring our own water bottles. Last but not least, regular exercise is the key to a healthy life.",l4zh:"最後但也同樣重要的是，我們必須記得帶自己的水樽。最後但也同樣重要的是，規律運動是健康生活的關鍵。",l5en:"Last but not least, the psychological well-being of the youth must be prioritized to ensure the long-term stability of our society. Last but not least, the success of any environmental policy hinges on the active participation and collective responsibility of every citizen.",l5zh:"最後但也同樣重要的是，必須優先考慮青少年的心理健康，以確保社會的長期穩定。最後但也同樣重要的是，任何環保政策的成功都取決於每位公民的積極參與和共同責任。"},
{id:33,zh:"眾所周知",pattern:"It is widely acknowledged that",answers:["it is widely acknowledged that","as everyone knows"],display:"It is widely acknowledged that / As everyone knows",note:"後者較口語，前者較正式。",exp:"用來引入大家普遍接受的事實。正式議論文建議優先用 It is widely acknowledged that。",l4en:"It is widely acknowledged that Hong Kong is a very safe city. It is widely acknowledged that smoking is harmful to our health.",l4zh:"眾所周知，香港是一個非常安全的城市。眾所周知，吸煙有害健康。",l5en:"It is widely acknowledged that the rapid advancement of artificial intelligence will fundamentally redefine the nature of work in the coming decade. It is widely acknowledged that cultural diversity is a cornerstone of innovation, fostering creativity through the exchange of unique perspectives.",l5zh:"眾所周知，人工智能的迅速發展將在未來十年從根本上重新定義工作的本質。眾所周知，文化多樣性是創新的基石，透過獨特觀點的交流來促進創意。"},
{id:34,zh:"毫不誇張地說",pattern:"It is no exaggeration to say that",answers:["it is no exaggeration to say that"],display:"It is no exaggeration to say that",note:"可用於 review 或強調句。",exp:"當你想用較強語氣強調觀點，但又保持書面感，呢句非常好用。",l4en:"It is no exaggeration to say that she is the best teacher in our school. It is no exaggeration to say that the food there was delicious.",l4zh:"毫不誇張地說，她是我們學校最好的老師。毫不誇張地說，那裡的食物非常好吃。",l5en:"It is no exaggeration to say that the invention of the smartphone has permanently altered the social fabric of modern civilization. It is no exaggeration to say that the survival of many traditional crafts depends on our ability to integrate them into the modern market.",l5zh:"毫不誇張地說，智慧型手機的發明永久地改變了現代文明的社會結構。毫不誇張地說，許多傳統工藝的生存取決於我們將其整合到現代市場中的能力。"},
{id:35,zh:"鑒於",pattern:"Given / In view of / In light of",answers:["given","in view of","in light of"],display:"Given / In view of / In light of",note:"正式寫作常見。",exp:"呢組都帶有『考慮到 / 鑒於』的意思，常見於公函、報告或正式議論。",l4en:"Given the bad weather, the sports day has been postponed. In light of the recent complaints, the school will change the cafeteria menu.",l4zh:"鑒於天氣惡劣，陸運會已延期。鑒於最近的投訴，學校將更改食堂菜單。",l5en:"In light of the mounting evidence of global warming, a global transition to renewable energy is no longer a choice, but a necessity. Given the increasing complexity of international trade, professionals must develop a high degree of adaptability and cross-cultural competence.",l5zh:"鑒於全球暖化證據不斷增加，全球向再生能源轉型已不再是一個選擇，而是一種必要。鑒於國際貿易日益複雜，專業人士必須具備高度的適應能力和跨文化競爭力。"},
{id:36,zh:"可以預見的是",pattern:"It is anticipated that",answers:["it is anticipated that"],display:"It is anticipated that",note:"預測未來發展。",exp:"呢句比 I think / I believe 更客觀，適合正式預測。",l4en:"It is anticipated that more tourists will visit Hong Kong this summer. It is anticipated that the new bridge will reduce traffic congestion.",l4zh:"預計今年夏天會有更多遊客訪問香港。預計新大橋將減少交通擁堵。",l5en:"It is anticipated that the rise of remote work will lead to a significant decentralization of urban populations in the near future. It is anticipated that biotechnological breakthroughs will soon provide more personalized and effective treatments for chronic illnesses.",l5zh:"可以預見的是，遠程辦公的興起將在不久的將來導致城市人口的顯著去中心化。可以預見的是，生物技術的突破很快將為慢性病提供更個性化且有效的治療方案。"},
{id:37,zh:"從而",pattern:"thereby + V-ing",answers:["thereby"],display:"thereby",note:"通常配 V-ing 一齊用。",exp:"Thereby 解作『從而』，後面多數接 V-ing，表示前句帶來的結果。",l4en:"He studied hard every day, thereby getting high marks in the exam. The company reduced waste, thereby saving a lot of money.",l4zh:"他每天努力學習，從而在考試中取得高分。公司減少了廢物，從而節省了很多錢。",l5en:"The government implemented strict emission controls, thereby significantly improving the city's air quality over the past decade. Urban planners integrated more green spaces into the city center, thereby mitigating the 'heat island effect' during peak summer months.",l5zh:"政府實施了嚴格的排放管制，從而在過去十年顯著改善了城市的空氣品質。城市規劃者將更多綠地整合到市中心，從而減輕了夏季高峰期的『熱島效應』。"},
{id:38,zh:"除了",pattern:"Apart from / Other than / Beyond",answers:["apart from","other than","beyond"],display:"Apart from / Other than / Beyond",note:"按語意揀最自然版本。",exp:"Apart from 最常用；Other than 帶有排除味道；Beyond 則較書面，常見於抽象延伸。",l4en:"Apart from apples, I also like oranges and bananas. Other than playing piano, she has no other hobbies.",l4zh:"除了蘋果，我也喜歡橙和香蕉。除了彈鋼琴，她沒有其他愛好。",l5en:"Beyond its primary function as a financial hub, Hong Kong serves as a crucial cultural bridge between the East and the West. Apart from the immediate economic benefits, the promotion of vocational education fosters a more diverse and resilient workforce.",l5zh:"除了作為金融中心的主要功能外，香港還充當東西方之間至關重要的文化橋樑。除了直接的經濟利益外，推廣職業教育還能培養更具多樣性和韌性的勞動力。"},
{id:39,zh:"一般而言",pattern:"In general / Generally speaking",answers:["in general","generally speaking"],display:"In general / Generally speaking",note:"提出一般現象時常用。",exp:"適合做概括性陳述，但如果後面係絕對事實，就要小心唔好講得太武斷。",l4en:"Generally speaking, students in our school are very polite. In general, the weather in spring is humid in Hong Kong.",l4zh:"一般而言，我們學校的學生很有禮貌。一般來說，香港春天的天氣很潮濕。",l5en:"Generally speaking, the younger generation is more receptive to digital innovation, though they are also more vulnerable to online misinformation. In general, policies that prioritize long-term sustainability tend to face initial resistance from sectors focused on short-term profits.",l5zh:"一般而言，年輕一代對數位創新更具接受力，儘管他們也更容易受到網絡虛假訊息的影響。一般來說，優先考慮長期可持續發展的政策往往會面臨專注於短期利潤部門的初期阻力。"},
{id:40,zh:"我深信",pattern:"I am convinced that",answers:["i am convinced that"],display:"I am convinced that",note:"立場句很好用。",exp:"I am convinced that 比 I think 更有說服力，適合清楚表態。",l4en:"I am convinced that hard work is the secret to success. I am convinced that we can protect our environment if we act now.",l4zh:"我深信努力是成功的秘訣。我深信如果我們現在行動，就能保護我們的環境。",l5en:"I am convinced that the cultivation of empathy is as essential as academic achievement in shaping a truly compassionate society. I am convinced that only through international collaboration can we effectively tackle global challenges like pandemics and climate change.",l5zh:"我深信在塑造一個真正富有同情心的社會方面，同理心的培養與學業成就同樣重要。我深信只有透過國際合作，我們才能有效應對大流行病和氣候變化等全球性挑戰。"},
{id:41,zh:"我建議 [公函]",pattern:"It is suggested that / It is advisable that",answers:["it is suggested that","it is advisable that"],display:"It is suggested that / It is advisable that",note:"公函語氣較穩妥。",exp:"寫正式建議時，用被動式會比 I suggest 更客觀、更禮貌。",l4en:"It is suggested that the school should provide more healthy food in the canteen. It is advisable that students bring their own laptops for the workshop.",l4zh:"建議學校在食堂提供更多健康食物。建議學生帶自己的手提電腦參加工作坊。",l5en:"It is advisable that the authorities implement stringent regulations on plastic waste to mitigate long-term environmental degradation. It is suggested that corporations adopt a more holistic approach to employee well-being, rather than focusing solely on financial incentives.",l5zh:"建議當局對塑料廢物實施嚴格監管，以減緩長期的環境退化。建議企業對員工福祉採取更全面的方法，而非僅專注於經濟獎勵。"},
{id:42,zh:"我希望",pattern:"I earnestly hope that / It is hoped that",answers:["i earnestly hope that","it is earnestly hoped that","it is hoped that"],display:"I earnestly hope that / It is (earnestly) hoped that",note:"第一身較個人，被動較正式。",exp:"I earnestly hope that 適合個人陳述；It is hoped that / It is earnestly hoped that 更適合公函。",l4en:"I earnestly hope that you can consider my application for the position. It is hoped that the new park will be open to the public soon.",l4zh:"我誠摯希望您能考慮我的職位申請。希望新公園能盡快對公眾開放。",l5en:"It is earnestly hoped that the upcoming climate summit will yield a concrete and legally binding agreement among global leaders. I earnestly hope that this proposal will serve as a catalyst for meaningful dialogue between the management and the staff.",l5zh:"誠摯希望即將舉行的氣候峰會能在全球領導人之間達成一項具體且具法律約束力的協議。我誠摯希望這份建議書能成為管理層與員工之間進行有意義對話的催化劑。"},
{id:43,zh:"例如 A, B 和 C",pattern:"such as / for example / ranging from A, B to C / from A, B to C",answers:["ranging from","such as","for example","from"],display:"such as A, B or C / for example A, B or C / ranging from A, B to C / from A, B to C",note:"可直接記 such as，同時熟習 ranging from A to C 呢種進階寫法。",exp:"列舉時可以用 such as / for example；想寫得有範圍感，就用 ranging from A to C 或 from A to C。",l4en:"The shop sells many things, ranging from clothes, shoes to accessories. Students join different clubs, ranging from sports, music to drama.",l4zh:"這家店賣很多東西，從衣服、鞋子到飾品都有。學生參加不同的社團，範圍涵蓋體育、音樂到戲劇。",l5en:"The festival offers a diverse array of activities ranging from traditional Cantonese opera performances to cutting-edge digital art installations. Urban problems ranging from severe air pollution to the acute shortage of affordable housing require immediate government intervention.",l5zh:"藝術節提供一系列多元活動，從傳統粵劇表演到尖端的數位藝術裝置應有盡有。從嚴重的空氣污染到經濟適用房的嚴重短缺，種種城市問題都需要政府立即干預。"},
{id:44,zh:"以 A 為例",pattern:"A is a case in point",answers:["is a case in point","a is a case in point"],display:"A is a case in point",note:"正式議論文很好用。",exp:"Case in point 解作『一個典型例子』，適合把抽象論點落到具體事例。",l4en:"Some people are very successful without a degree. Bill Gates is a case in point. Fast food is unhealthy. The high sugar content in sodas is a case in point.",l4zh:"有些人沒有學位也很成功。比爾·蓋茨就是一個例子。快餐不健康。汽水中的高含糖量就是一個例子。",l5en:"The commercialization of traditional festivals has reached an alarming level; the transformation of Lunar New Year into a shopping frenzy is a case in point. Public infrastructure can significantly revitalize a district; the development of the Kai Tak Cruise Terminal is a case in point.",l5zh:"傳統節日的商業化已達到令人擔憂的程度；農曆新年演變成購物狂熱就是一個典型的例子。公共基礎設施可以顯著振興一個地區；啟德郵輪碼頭的發展就是一個案例。"},
{id:45,zh:"作數據",pattern:"A survey conducted by ... reveals that",answers:["a survey conducted by the university of hong kong reveals that"],display:"A survey conducted by the University of Hong Kong reveals that",note:"引用數據時很好用。",exp:"呢個句式幫你將論點變得更有根據。考場上可按題目換成 school / NGO / university 等機構。",l4en:"A survey conducted by the school reveals that 80% of students like the new library. A survey conducted by a local newspaper reveals that many people are unhappy with the bus service.",l4zh:"學校進行的一項調查顯示，80% 的學生喜歡新圖書館。當地一家報紙進行的調查顯示，許多人對巴士服務不滿意。",l5en:"A survey conducted by the University of Hong Kong reveals that a staggering majority of fresh graduates feel overwhelmed by the city's high cost of living. A survey conducted by an international NGO reveals that there is a growing consensus among consumers regarding the importance of ethical sourcing.",l5zh:"香港大學進行的一項調查顯示，絕大多數應屆畢業生對城市的高昂生活成本感到不堪重負。一家國際非政府組織進行的調查顯示，消費者對於道德採購重要性的共識正在增長。"},
{id:46,zh:"如果 [公函]",pattern:"Should + subject + verb",answers:["should"],display:"Should",note:"倒裝禮貌句。",exp:"Should 開首屬於倒裝條件句，等於 If，但更正式、更有公函感。",l4en:"Should you have any questions, please contact us at any time. Should the weather be bad, the event will be held indoors.",l4zh:"如果您有任何問題，請隨時聯繫我們。如果天氣惡劣，活動將在室內舉行。",l5en:"Should any discrepancies arise during the auditing process, the accounting department must be notified immediately to rectify the errors. Should the government fail to address the root causes of social discontent, the stability of the city could be compromised in the long run.",l5zh:"若審計過程中出現任何差異，必須立即通知會計部以糾正錯誤。若政府未能解決社會不滿的根源，城市的長期穩定可能會受到損害。"},
{id:47,zh:"，這",pattern:", which",answers:["which"],display:"which",note:"非限制性子句。",exp:"Which 放逗號後面，係用來補充前面整句帶來的結果或說明。",l4en:"He finished his work on time, which made his boss very happy. The city has invested heavily in smart technology, which is expected to enhance the efficiency of public transport and reduce carbon emissions.",l4zh:"他準時完成了工作，這讓他的老闆很高興。城市在智能技術方面投入巨資，這有望提高公共交通效率並減少碳排放。",l5en:"The city has invested heavily in smart technology, which is expected to enhance the efficiency of public transport and reduce carbon emissions. The proposal includes a clear carbon-reduction roadmap, which makes it far more convincing than previous plans.",l5zh:"城市在智能技術方面投入巨資，這有望提高公共交通效率並減少碳排放。這項提案包括清晰的減碳路線圖，這令它比以往的方案更具說服力。"},
{id:48,zh:"，而這",pattern:", and this",answers:["and this"],display:"and this",note:"承接前句結果。",exp:"And this 係將前句結果拉長一點再補充後果，語氣比 which 更直接。",l4en:"The prices of vegetables have increased, and this has affected many families. The company adopted a work-from-home policy indefinitely, and this strategic shift has significantly expanded its pool of global talent.",l4zh:"蔬菜價格上漲了，而這影響了許多家庭。公司無限期採取居家辦公政策，而這一戰略轉變顯著擴大了其全球人才庫。",l5en:"The company adopted a work-from-home policy indefinitely, and this strategic shift has significantly expanded its pool of global talent. The city allocated more funding to mental-health services, and this move has eased pressure on public hospitals.",l5zh:"公司無限期採取居家辦公政策，而這一戰略轉變顯著擴大了其全球人才庫。城市向心理健康服務投放更多資源，而這項措施減輕了公立醫院的壓力。"},
{id:49,zh:"隨著 + 句子 / 名詞",pattern:"As + 句子 / With + 名詞",answers:["with the rise of","with the emergence of","with the advent of","with the popularity of","as","with"],display:"As / With / With the rise of / With the advent of / With the emergence of / With the popularity of",note:"As 後接句子；With 後接名詞。",exp:"你個正式版重點係分清楚 As 同 With：As 後面接句子；With 後面接名詞，亦可延伸成 with the rise of 等高階片語。",l4en:"With the rise of smartphones, people spend more time on social media. With the emergence of online shopping, many physical stores are closing.",l4zh:"隨著智慧型手機的興起，人們花更多時間在社交媒體上。隨著網購的出現，許多實體店正在倒閉。",l5en:"With the emergence of generative artificial intelligence, the boundaries between human creativity and machine-led automation have become increasingly blurred. With the rise of conscious consumerism, brands are now under immense pressure to demonstrate transparency in their supply chains.",l5zh:"隨著生成式人工智能的出現，人類創意與機器自動化之間的界限已變得日益模糊。隨著自覺消費主義的興起，各大品牌現在面臨巨大壓力，要求其供應鏈展現透明度。"},
{id:50,zh:"有了 / 憑著",pattern:"With",answers:["with"],display:"With",note:"後面通常接名詞片語。",exp:"With 可以表『有了 / 憑著 / 藉著』，常用來帶出條件或資源。",l4en:"With enough practice, students can improve quickly. With his parents' support, he finally regained confidence.",l4zh:"有了足夠練習，學生可以很快進步。憑著父母的支持，他終於重拾信心。",l5en:"With sustained public support, the city can accelerate its transition to renewable energy. With access to accurate data, policymakers are more capable of addressing structural inequality effectively.",l5zh:"有了持續的公眾支持，城市可以加快向可再生能源轉型。憑著準確數據，政策制定者更有能力有效處理結構性不平等。"},
{id:51,zh:"而 [比較差異]",pattern:"Whereas",answers:["whereas"],display:"whereas",note:"強調兩者差異。",exp:"Whereas 最適合做清楚對比，語氣比 but 更像分析兩邊不同。",l4en:"My sister enjoys reading novels, whereas I prefer playing video games. Some people like living in the city, whereas others prefer the countryside.",l4zh:"我姐姐喜歡讀小說，而我更喜歡玩電子遊戲。有些人喜歡住在城市，而有些人則偏好郊外。",l5en:"Traditional marketing relies heavily on television and print media, whereas digital marketing leverages data analytics to target specific consumer demographics with surgical precision. The older generation often views job stability as the ultimate career goal, whereas Gen Z workers tend to prioritize personal fulfillment and corporate social responsibility.",l5zh:"傳統營銷高度依賴電視和平面媒體，而數位營銷則利用數據分析，以極高的精確度瞄準特定的消費群體。年長一代往往將工作穩定視為職業終極目標，而 Z 世代員工則傾向於優先考慮個人成就感與企業社會責任。"},
{id:52,zh:"...的是",pattern:"What ... is",answers:["what"],display:"What ... is",note:"What-clause 強調句式。",exp:"What-clause 可以將你想強調的內容放到句尾，令焦點更鮮明。",l4en:"What I want to say is that we should all try our best. What the school needs is a bigger library for the students.",l4zh:"我想說的是我們都應該盡力而為。學校需要的是一個更大的圖書館給學生。",l5en:"What remains most intriguing to sociologists is the resilience of traditional family values in the face of rapid technological disruption. What policymakers must address urgently is not the lack of resources, but the inefficient distribution of those resources among the grassroots community.",l5zh:"令社會學家最感興趣的是，在面對科技迅速衝擊時，傳統家庭價值觀所展現的韌性。政策制定者必須緊迫處理的，並非資源匱乏，而是這些資源在基層社區中分配效率低下的問題。"},
{id:53,zh:"不但",pattern:"Not only + 提問字 / 助動詞 + 主語",answers:["not only"],display:"Not only ... but also ...",note:"句首時常用倒裝，例如 Not only did / does / is + 主語。",exp:"你份清單重點係 Not only 後面要識得配提問字或助動詞去倒裝。完整句型常見為 Not only ... but also ...。",l4en:"Not only is the new policy good for the environment, but it also helps the economy. He not only finished the task quickly but also maintained high quality.",l4zh:"新政策不僅對環境有利，對經濟也有幫助。他不僅快速完成了任務，還保持了高質量。",l5en:"Not only did the government's intervention stabilize the volatile market, but it also restored the confidence of international investors. Not only does excessive reliance on social media erode interpersonal skills, but it also exacerbates the crisis of mental well-being among the youth.",l5zh:"政府的干預不僅穩定了動盪的市場，還恢復了國際投資者的信心。過度依賴社交媒體不僅侵蝕人際交往能力，還加劇了青少年的心理健康危機。"},
{id:54,zh:"透過",pattern:"Through",answers:["through"],display:"Through",note:"表示方式、途徑。",exp:"Through 後面常接名詞或 V-ing 結構，表示藉由某方法達成結果。",l4en:"We can improve our English through reading more books and watching movies. The company increased its profit through reducing unnecessary costs.",l4zh:"我們可以透過閱讀更多書籍和看電影來提高英語。公司透過減少不必要的成本來增加利潤。",l5en:"Through the rigorous implementation of sustainable urban planning, the city has successfully mitigated the adverse effects of rapid industrialization. Values such as perseverance and empathy are best instilled in children through active participation in community service.",l5zh:"透過嚴格執行可持續城市規劃，該城市成功緩解了快速工業化的負面影響。堅韌和同理心等價值觀，最好是透過積極參與社區服務來灌輸給孩子。"},
{id:55,zh:"為了",pattern:"To / In order to / So as to",answers:["to","in order to","so as to"],display:"to / in order to / so as to",note:"都可表目的。",exp:"To 最簡潔；in order to 最直接；so as to 稍微書面。三者後面都接原形動詞。",l4en:"I work part-time in order to gain some work experience. He woke up early so as to avoid the morning traffic jam.",l4zh:"我兼職是為了獲得一些工作經驗。他早起是為了避開早上的交通堵塞。",l5en:"The authorities have launched a series of workshops so as to equip local entrepreneurs with the necessary digital tools for the modern era. In order to foster a more inclusive society, it is imperative for the government to eliminate systemic barriers in the education system.",l5zh:"當局舉辦了一系列工作坊，旨在為本地創業家提供現代所需的新型數位工具。為了培養更具包容性的社會，政府必須消除教育系統中的系統性障礙。"},
{id:56,zh:"結果係",pattern:"It turns out that / It turned out that",answers:["it turns out that","it turned out that"],display:"It turns out that / It turned out that",note:"常用於故事或出人意表結果。",exp:"It turns out that 偏現在敘述；It turned out that 偏過去故事。兩者都有『結果發現』意思。",l4en:"I thought the exam would be easy, but it turned out that I was wrong. It turns out that the missing keys were in his pocket all along.",l4zh:"我以為考試會很容易，但結果證明我錯了。結果發現，失蹤的鑰匙一直都在他的口袋裡。",l5en:"It turns out that the implementation of the four-day work week has significantly boosted productivity rather than hindering it. Although many were skeptical of the new technology initially, it turns out that it has become an indispensable part of our daily lives.",l5zh:"結果證明，實施每週四天工作制顯著提高了生產力，而非阻礙了它。儘管最初許多人對這項新技術持懷疑態度，但事實證明它已成為我們日常生活不可或缺的一部分。"},
{id:57,zh:"而不是",pattern:"Instead of / Rather than",answers:["instead of","rather than"],display:"Instead of / Rather than",note:"表取代或偏好。",exp:"Instead of 偏『取代』；rather than 亦可表『寧願……而不……』。",l4en:"Instead of playing video games, he spent the afternoon reading. I prefer to walk to school rather than taking the bus.",l4zh:"他整個下午都在看書，而不是玩電子遊戲。我寧願走路去學校，而不願坐巴士。",l5en:"Instead of merely penalizing students for their mistakes, educators should strive to create a safe environment where failure is seen as a learning opportunity. The government should focus on long-term prevention rather than relying on short-term fixes to address the housing crisis.",l5zh:"教育者應努力創造一個將失敗視為學習機會的安全環境，而非僅僅因為錯誤而懲罰學生。政府應專注於長期預防，而非依賴短期補丁來解決住房危機。"},
{id:58,zh:"而不 / 而沒 / 而沒有",pattern:"Without",answers:["without"],display:"without",note:"後面通常接 noun / V-ing。",exp:"Without 本身已帶否定，所以後面通常唔再加 not。常接名詞或動名詞。",l4en:"He left the room without saying a word to anyone. You cannot pass the exam without studying hard every day.",l4zh:"他沒跟任何人說一句話就離開了房間。如果不每天努力學習，你就無法通過考試。",l5en:"It is virtually impossible to achieve sustainable growth without addressing the fundamental issues of resource depletion and environmental degradation. Innovation rarely occurs in a vacuum without the constant exchange of diverse perspectives and provocative ideas.",l5zh:"如果不解決資源枯竭和環境退化的根本問題，幾乎不可能實現可持續增長。如果沒有多元觀點與啟發性思想的持續交流，創新很難在真空環境中產生。"},
];
const fallback={exp:"此連接詞已加入題庫，之後可以再補更完整教學內容。",l4en:"Example will be added.",l4zh:"例句稍後補上。",l5en:"Advanced example will be added.",l5zh:"進階例句稍後補上。"};
const QN=20,TL=30;let qs=[],i=0,score=0,checked=false,left=TL,timer,wrong=[],hist=[];
const $=id=>document.getElementById(id),dom={game:$("game"),end:$("end"),n:$("n"),t:$("t"),s:$("s"),fill:$("fill"),tt:$("tt"),main:$("main"),sub:$("sub"),note:$("note"),inputGrid:$("input-grid"),teach:$("teach"),exp:$("exp"),eg4:$("eg4"),eg5:$("eg5"),check:$("check"),next:$("next")};
const ctx=new(window.AudioContext||window.webkitAudioContext)();
function ensureAudio(){if(ctx.state==="suspended")ctx.resume().catch(()=>{})}
function tone(f,t,d,gain=.1){ensureAudio();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(gain,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);o.start();o.stop(ctx.currentTime+d)}
const sfx={
ok:()=>{tone(660,"square",.08,.08);setTimeout(()=>tone(880,"square",.18,.08),90)},
bad:()=>{tone(220,"sawtooth",.18,.08);setTimeout(()=>tone(160,"sawtooth",.2,.06),120)},
next:()=>tone(520,"triangle",.08,.05),
tap:()=>tone(420,"sine",.04,.03),
timeout:()=>{tone(260,"square",.12,.07);setTimeout(()=>tone(220,"square",.12,.06),100);setTimeout(()=>tone(180,"square",.18,.06),200)}
};
const norm=v=>v.toLowerCase()
.replace(/（/g,"(").replace(/）/g,")")
.replace(/主語/g,"subject").replace(/subj/g,"subject")
.replace(/形容詞/g,"adjective").replace(/\badj\b/g,"adjective")
.replace(/句子/g,"clause").replace(/sentence/g,"clause")
.replace(/名詞片語/g,"noun phrase").replace(/名詞詞組/g,"noun phrase").replace(/名詞短語/g,"noun phrase").replace(/名詞/g,"noun")
.replace(/\bnp\b/g,"noun phrase").replace(/\bn phrase\b/g,"noun phrase").replace(/\bnoun phrase\b/g,"noun phrase")
.replace(/\bsb\b/g,"subject").replace(/\bsth\b/g,"something")
.replace(/\bcl\b/g,"clause")
.replace(/提問字/g,"wh-word").replace(/疑問詞/g,"wh-word")
.replace(/助動詞/g,"auxiliary verb").replace(/be動詞/g,"be verb").replace(/be verb/g,"be")
.replace(/動名詞/g,"v-ing").replace(/\bving\b/g,"v-ing").replace(/\bvin?g\b/g,"v-ing").replace(/\bv ing\b/g,"v-ing")
.replace(/現在分詞/g,"v-ing")
.replace(/\bvpp\b/g,"past participle")
.replace(/原形/g,"base form")
.replace(/子句/g,"clause")
.replace(/＋/g,"+")
.replace(/[.,;:!?'()"[\]，、]/g," ")
.replace(/\s+/g," ")
.trim();
const normLoose=v=>norm(v).replace(/[+\s]/g,"");
function shuf(arr){const a=[...arr];for(let x=a.length-1;x>0;x--){const y=Math.floor(Math.random()*(x+1));[a[x],a[y]]=[a[y],a[x]]}return a}
function init(retry=false){qs=retry?[...wrong]:shuf(bank).slice(0,QN);wrong=[];score=0;i=0;hist=[];dom.game.style.display="block";dom.end.style.display="none";dom.t.innerText=qs.length;load()}
function splitEn(text){return (text||"").match(/[^.!?]+[.!?]+|[^.!?]+$/g)||[]}
function splitZh(text){return (text||"").match(/[^。！？]+[。！？]+|[^。！？]+$/g)||[]}
function renderExamples(title,enText,zhText){const en=splitEn(enText).map(s=>s.trim()).filter(Boolean),zh=splitZh(zhText).map(s=>s.trim()).filter(Boolean),count=Math.max(en.length,zh.length);return `<strong>${title}</strong>${Array.from({length:count},(_,idx)=>`<p>${en[idx]||""}</p><p>${zh[idx]||""}</p>`).join("")}`}
function getInputs(){return [...dom.inputGrid.querySelectorAll("input")]}
function buildInputs(q){dom.inputGrid.innerHTML="";q.answers.forEach((_,idx)=>{const input=document.createElement("input");input.autocomplete="off";input.spellcheck=false;input.placeholder=`答案 ${idx+1}`;input.dataset.index=idx;dom.inputGrid.appendChild(input)})}
function renderTeach(q){const d={...fallback,...q};dom.exp.textContent=d.exp;dom.eg4.innerHTML=renderExamples("Level 4",d.l4en,d.l4zh);dom.eg5.innerHTML=renderExamples("Level 5",d.l5en,d.l5zh);dom.note.innerText=q.note||"";dom.note.style.display="block";dom.sub.innerText=q.pattern||"";dom.sub.style.display=q.pattern?"block":"none";dom.teach.style.display="block"}
function load(){if(i>=qs.length)return end();checked=false;dom.check.style.display="block";dom.next.style.display="none";dom.check.disabled=false;document.querySelectorAll(".ans").forEach(x=>x.remove());dom.teach.style.display="none";dom.note.style.display="none";dom.sub.style.display="none";const q=qs[i];buildInputs(q);const inputs=getInputs();inputs.forEach(input=>{input.value="";input.className="";input.disabled=false});dom.main.innerText=q.zh;dom.n.innerText=i+1;dom.s.innerText=score;inputs[0]?.focus();start()}
function start(){clearInterval(timer);left=TL;ui();timer=setInterval(()=>{left-=.1;if(left<=0){left=0;check(true)}ui()},100)}
function ui(){dom.tt.innerText=left.toFixed(1);dom.fill.style.width=(left/TL*100)+"%";dom.fill.style.background=left<5?"var(--danger)":"var(--p)"}
function check(timeout=false){if(checked)return;checked=true;clearInterval(timer);dom.check.disabled=true;const q=qs[i],inputs=getInputs(),userVals=inputs.map(x=>normLoose(x.value)).filter(Boolean),expected=q.answers.map(normLoose),remaining=[...expected];let ok=userVals.length===expected.length;userVals.forEach(v=>{const idx=remaining.indexOf(v);if(idx===-1)ok=false;else remaining.splice(idx,1)});const userText=inputs.map(x=>x.value.trim()||"(留空)").join(" / ");if(ok&&!timeout){inputs.forEach(x=>x.classList.add("ok"));score++;sfx.ok()}else{inputs.forEach(x=>x.classList.add("bad"));const hint=document.createElement("span");hint.className="ans";hint.innerText=q.display;dom.inputGrid.insertAdjacentElement("afterend",hint);if(!wrong.includes(q))wrong.push(q);hist.push([q.zh,q.pattern||"",userText,q.display]);timeout?sfx.timeout():sfx.bad()}renderTeach(q);inputs.forEach(x=>x.disabled=true);dom.s.innerText=score;dom.check.style.display="none";dom.next.style.display="block"}
function retry(){if(!wrong.length)return alert("暫時沒有錯題可以重做。");init(true)}
function end(){dom.game.style.display="none";dom.end.style.display="block";const max=qs.length,p=max?Math.round(score/max*100):0;const detail=hist.length?`<div class="analysis"><h3 style="color:var(--danger);margin-top:0">錯題分析 (${hist.length} 題)</h3>${hist.map(x=>`<div class="item"><div class="title">${x[0]}</div><div class="row">提示：${x[1]}</div><div class="row">你的答案：${x[2]}</div><div class="row">可接受答案：${x[3]}</div></div>`).join("")}</div>`:`<h3 style="color:var(--s);margin-top:30px">完美，全對。</h3>`;dom.end.innerHTML=`<h1>Challenge Complete!</h1><div class="score">得分: ${score} / ${max} (${p}%)</div>${detail}<div class="rctrl"><button class="rbtn menu" type="button" onclick="history.back()">返回</button>${wrong.length?`<button class="rbtn retry" type="button" onclick="retry()">重做錯題</button>`:""}<button class="rbtn restart" type="button" onclick="init(false)">重新開始</button></div>`}
dom.check.onclick=()=>{sfx.tap();check(false)};dom.next.onclick=()=>{sfx.next();i++;load()};document.addEventListener("pointerdown",ensureAudio,{once:true});document.addEventListener("keydown",e=>{if(e.key==="Enter"){const inputs=getInputs(),currentIndex=inputs.indexOf(document.activeElement);if(currentIndex>-1&&currentIndex<inputs.length-1&&!inputs[currentIndex+1].disabled){e.preventDefault();sfx.tap();inputs[currentIndex+1].focus();return}e.preventDefault();if(dom.check.style.display!=="none"&&!dom.check.disabled){sfx.tap();check(false)}else if(dom.next.style.display!=="none"){sfx.next();i++;load()}}});init();
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("./service-worker.js").catch(()=>{})})}
</script>
